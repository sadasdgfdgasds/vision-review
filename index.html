<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>计算机视觉复习 · 知识整理</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--accent:#4361ee;--accent-light:#eef0ff;--text:#1a1a2e;--text2:#555;--border:#e2e4ef;--green:#2ec4b6;--orange:#ff6b35;--red:#e63946;--radius:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scroll-padding-top:80px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;height:64px;padding:0 24px}
.header h1{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:.3px}
.header .hdr-sub{margin-left:12px;font-size:13px;color:var(--text2)}
.header .hdr-badge{margin-left:auto;font-size:12px;background:var(--accent-light);color:var(--accent);padding:4px 14px;border-radius:20px;font-weight:600}
.sidebar{position:fixed;top:64px;left:0;bottom:0;width:220px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;z-index:50}
.sidebar a{display:block;padding:8px 20px;font-size:13px;color:var(--text2);text-decoration:none;transition:all .15s;border-left:3px solid transparent}
.sidebar a:hover,.sidebar a.active{color:var(--text);background:var(--accent-light);border-left-color:var(--accent)}
.sidebar .sec-label{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text2);padding:16px 20px 4px;letter-spacing:.5px}
.sidebar .sec-label:first-of-type{padding-top:4px}
.main{margin-left:220px;margin-top:64px;padding:32px 40px 80px;max-width:960px}
.section{margin-bottom:48px}
.section h2{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--accent-light)}
.section h3{font-size:16px;font-weight:600;margin:20px 0 8px;color:var(--text)}
.section p,.section li{font-size:14px;color:var(--text);margin-bottom:6px}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px 20px;margin-bottom:12px}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.04)}
.card-row{display:flex;gap:8px;align-items:flex-start}
.card-row .tag{flex-shrink:0;font-size:11px;font-weight:700;background:var(--accent-light);color:var(--accent);padding:2px 10px;border-radius:12px;margin-top:3px}
.card-row .body{flex:1;min-width:0}
.q-block{margin-bottom:12px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.q-q{background:var(--card);padding:12px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:14px;user-select:none}
.q-q:hover{background:var(--accent-light)}
.q-q .arrow{transition:transform .2s;font-size:12px;color:var(--text2)}
.q-q.open .arrow{transform:rotate(180deg)}
.q-a{background:#fafbfc;padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease}
.q-a.show{max-height:400px;padding:12px 16px}
.q-a .ans{font-size:14px;color:var(--text)}
.q-a .ans .label{font-weight:700;color:var(--accent)}
.t-f .q-q .tru{color:var(--green);font-weight:700}
.t-f .q-q .fls{color:var(--red);font-weight:700}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:24px 16px 80px}.grid-2{grid-template-columns:1fr}}
.note{background:#fff8e1;border-left:3px solid #ffb300;padding:8px 14px;margin:12px 0;font-size:13px;border-radius:0 6px 6px 0}
</style>
</head>

  <h1>📖 计算机视觉复习</h1>

  <span class=hdr-badge>2 份文档 · 整理完成</span>
</div>
<nav class=sidebar id=sidebar></nav>
<div class=main id=main></div>

const sidebar=document.getElementById("sidebar");
const main=document.getElementById("main");
let navHTML='', contentHTML='';

data.sections.forEach((sec,i)=>{
  const isQ=sec.id.startsWith("questions-");
  navHTML+='<div class=sec-label>'+(isQ?'📝 题库':'📖 '+sec.label)+'</div>';
  sec.items.forEach((item,j)=>{
    const lid=sec.id+'-'+j;
    const label=isQ?(item.t||item.q||''):'· '+item.t;
    navHTML+='<a href="#'+lid+'">'+label+'</a>';
  });
});
sidebar.innerHTML=navHTML;

function renderSection(sec){
  const isQ=sec.id.startsWith("questions-");
  let html='<div class=section id="'+sec.id+'"><h2>'+(isQ?'📝 ':'')+sec.label+'</h2>';
  sec.items.forEach((item,idx)=>{
    const lid=sec.id+'-'+idx;
    if(isQ){
      if(sec.id==='questions-tf'){
        const v=item.v===1?'✅ 正确':'❌ 错误';
        const cls=item.v===1?'tru':'fls';
        html+='<div class=q-block id="'+lid+'"><div class=q-q onclick="toggle(this)"><span>'+item.t+'</span><span class="arrow '+cls+'">'+v+'</span></div></div>';
      } else {
        html+='<div class=q-block id="'+lid+'"><div class=q-q onclick="toggle(this)"><span>'+item.t+'</span><span class=arrow>▼</span></div><div class=q-a><div class=ans><span class=label>答案：</span>'+item.a+'</div></div></div>';
      }
    } else {
      if(item.t) html+='<h3>'+item.t+'</h3>';
      if(item.h){
        html+='<div class="grid-2">';
        item.h.forEach(k=>{
          html+='<div class=card><div class=card-row><span class=tag>要点</span><div class=body><strong>'+(k.q||'')+'</strong><br><span>'+(k.a||'')+'</span></div></div></div>';
        });
        html+='</div>';
      }
    }
  });
  html+='</div>';
  return html;
}

data.sections.forEach(sec=>{contentHTML+=renderSection(sec);});
main.innerHTML=contentHTML;

function toggle(el){
  const parent=el.closest('.q-block');
  const answer=parent.querySelector('.q-a');
  const arrow=el.querySelector('.arrow');
  if(answer){
    if(answer.classList.contains('show')){
      answer.classList.remove('show'); el.classList.remove('open');
    } else {
      answer.classList.add('show'); el.classList.add('open');
    }
  }
}

const links=sidebar.querySelectorAll('a');
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      links.forEach(l=>{l.classList.toggle('active',l.getAttribute('href')==='#'+e.target.id);});
    }
  });
},{threshold:.3,rootMargin:'-80px 0px'});
document.querySelectorAll('.section').forEach(el=>observer.observe(el));
</script>
