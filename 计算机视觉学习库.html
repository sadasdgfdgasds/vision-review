<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计算机视觉学习库</title>
<style>
:root {
  --bg: #fafafa;
  --surface: #ffffff;
  --border: #e2e4e9;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --accent: #3b82f6;
  --accent-light: #eff6ff;
  --tag-bg: #e8f0fe;
  --link: #2563eb;
  --hover: #f3f4f6;
  --sidebar-width: 300px;
  --header-height: 56px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
  background: var(--bg);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Sidebar */
#sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#sidebar-header h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 12px;
}
#sidebar-search {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
#sidebar-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

#sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.nav-section { margin: 4px 0; }
.nav-section-title {
  padding: 6px 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
}
.nav-item {
  display: block;
  padding: 6px 20px 6px 28px;
  font-size: 13px;
  color: var(--text);
  text-decoration: none;
  cursor: pointer;
  border-radius: 0;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nav-item:hover { background: var(--hover); }
.nav-item.active {
  background: var(--accent-light);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 600;
}
.nav-tag {
  display: inline-block;
  padding: 3px 10px;
  margin: 2px 4px;
  font-size: 11px;
  border-radius: 12px;
  background: var(--tag-bg);
  color: var(--accent);
  cursor: pointer;
  transition: all 0.15s;
}
.nav-tag:hover { background: var(--accent); color: white; }
.nav-tag.active { background: var(--accent); color: white; }
#tags-section {
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  max-height: 160px;
  overflow-y: auto;
  flex-shrink: 0;
}
#tags-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

/* Main */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#main-header {
  height: var(--header-height);
  padding: 0 32px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  gap: 12px;
}
#breadcrumb {
  font-size: 13px;
  color: var(--text-muted);
}
#breadcrumb span { cursor: pointer; }
#breadcrumb span:hover { color: var(--accent); }
#breadcrumb-sep { margin: 0 6px; color: var(--border); }
#content-area {
  flex: 1;
  overflow-y: auto;
  padding: 32px 48px;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

/* Content styling */
.content h1 { font-size: 28px; margin-bottom: 16px; font-weight: 700; }
.content h2 { font-size: 20px; margin: 28px 0 12px; font-weight: 600; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.content h3 { font-size: 17px; margin: 24px 0 8px; font-weight: 600; }
.content h4 { font-size: 15px; margin: 20px 0 6px; font-weight: 600; }
.content p { margin: 8px 0; }
.content ul, .content ol { margin: 8px 0; padding-left: 24px; }
.content li { margin: 4px 0; }
.content code {
  background: #f1f5f9;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: "JetBrains Mono", "Fira Code", monospace;
}
.content pre {
  background: #1e293b;
  color: #e2e8f0;
  padding: 16px 20px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 12px 0;
  font-size: 13px;
  line-height: 1.5;
}
.content pre code { background: none; color: inherit; padding: 0; border-radius: 0; }
.content blockquote {
  border-left: 4px solid var(--accent);
  padding: 8px 16px;
  margin: 12px 0;
  background: var(--accent-light);
  border-radius: 0 8px 8px 0;
}
.content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.content table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 13px;
}
.content td {
  padding: 8px 12px;
  border: 1px solid var(--border);
}
.content tr:nth-child(even) { background: #f8fafc; }
.content a { color: var(--link); text-decoration: none; }
.content a:hover { text-decoration: underline; }
.content a.wiki-link { color: var(--accent); font-weight: 500; }
.content a.wiki-link:hover { text-decoration: underline; }
.content strong { font-weight: 600; }

/* Frontmatter card */
#fm-card {
  background: var(--accent-light);
  border: 1px solid #bfdbfe;
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 24px;
  font-size: 13px;
  line-height: 1.6;
}
#fm-card .fm-row { display: flex; gap: 8px; margin: 2px 0; }
#fm-card .fm-label { color: var(--text-muted); min-width: 60px; flex-shrink: 0; }
#fm-tags { display: inline-flex; gap: 4px; flex-wrap: wrap; }
#fm-tags .tag-pill {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
  background: white;
  border: 1px solid #bfdbfe;
  font-size: 11px;
  color: var(--accent);
  cursor: pointer;
}
#fm-tags .tag-pill:hover { background: var(--accent); color: white; }

/* Backlinks */
#backlinks-section { margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border); }
#backlinks-section h3 { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
#backlinks-list { list-style: none; padding: 0; }
#backlinks-list li { margin: 4px 0; }
#backlinks-list a { font-size: 13px; }
#backlinks-list a::before { content: "← "; color: var(--text-muted); }

/* Welcome page special */
.welcome-section { margin: 16px 0; }
.welcome-section h2 { border: none; margin-top: 16px; }
.welcome-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
.welcome-category { margin: 8px 0; }
.welcome-category h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--accent); }
.welcome-category a { display: block; font-size: 13px; padding: 2px 0; }

/* Empty state */
#empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
#empty-state h2 { font-size: 20px; margin-bottom: 8px; border: none; }
#empty-state p { font-size: 14px; }

/* Scrollbar */
#sidebar-content::-webkit-scrollbar, #content-area::-webkit-scrollbar {
  width: 6px;
}
#sidebar-content::-webkit-scrollbar-thumb, #content-area::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

/* Mobile */
#menu-toggle { display: none; background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; color: var(--text); }
@media (max-width: 768px) {
  #sidebar { position: fixed; z-index: 100; left: -100%; top: 0; height: 100%; transition: left 0.3s; }
  #sidebar.open { left: 0; }
  #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
  #sidebar-overlay.show { display: block; }
  #menu-toggle { display: block; }
  #content-area { padding: 20px 16px; }
  #main-header { padding: 0 16px; gap: 8px; }
}
</style>
</head>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">

    <input id="sidebar-search" type="text" placeholder="搜索笔记..." oninput="filterNotes(this.value)">

  <div id="sidebar-content"></div>
  <div id="tags-section">

</div>

<!-- Main -->
<div id="main">

    <div id="breadcrumb"><span onclick="showWelcome()">首页</span></div>
  </div>
  <div id="content-area"></div>
</div>

-特征与匹配/003-模板匹配]] — 单目标/多目标匹配、6种匹配方法\n\n### 目标检测与识别\n- [[06-目标检测与识别/001-人脸检测]] — Haar级联、DNN检测\n- [[06-目标检测与识别/002-人脸识别]] — EigenFaces、FisherFaces、LBPH\n- [[06-目标检测与识别/003-图像分类与检索]] — 分类与检索概念\n\n### 机器学习与深度学习\n- [[07-机器学习与深度学习/001-机器学习基础]] — kNN、SVM、k-means\n- [[07-机器学习与深度学习/002-深度学习与DNN]] — 框架、推理流程\n- [[07-机器学习与深度学习/003-特征提取概述]] — 颜色、纹理、形状、空间特征\n\n---\n\n## 🔗 快速导航\n- 按标签浏览：[[00-ALL索引]]\n- 如果想从基础开始，从 [[01-基础知识/001-数字图像基础]] 开始阅读\n\n*共 20+ 篇笔记 | 自动索引见 [[00-ALL索引]]*","html":"<h1>🧠 计算机视觉学习库</h1>\n\n<blockquote>基于两份学习资料整理而成：<strong>计算机视觉复习.docx</strong> 和 <strong>视觉A.docx</strong></blockquote>\n<blockquote>涵盖 OpenCV 基础操作、图像处理、特征检测、目标识别及机器学习等内容。</blockquote>\n\n<hr>\n\n<h2>📂 目录结构</h2>\n\n<h3>基础知识</h3>\n<ul>\n<li><a href=\"#01-%E5%9F%BA%E7%A1%80%E7%9F%A5%E8%AF%86%2F001-%E6%95%B0%E5%AD%97%E5%9B%BE%E5%83%8F%E5%9F%BA%E7%A1%80\" class=\"wiki-link\">001-数字图像基础</a> — 像素、灰度、RGB/BGR、色彩深度</li>\n<li><a href=\"#01-%E5%9F%BA%E7%A1%80%E7%9F%A5%E8%AF%86%2F002-OpenCV%E7%AE%80%E4%BB%8B\" class=\"wiki-link\">002-OpenCV简介</a> — 历史、模块结构、OpenCV-Python 优势</li>\n\n</ul>\n<h3>OpenCV 基础操作</h3>\n<ul>\n<li><a href=\"#02-OpenCV%E5%9F%BA%E7%A1%80%2F001-NumPy%E6%95%B0%E7%BB%84\" class=\"wiki-link\">001-NumPy数组</a> — 数组创建、形状操作、索引</li>\n<li><a href=\"#02-OpenCV%E5%9F%BA%E7%A1%80%2F002-%E5%9B%BE%E5%83%8F%E8%AF%BB%E5%86%99%E4%B8%8E%E6%98%BE%E7%A4%BA\" class=\"wiki-link\">002-图像读写与显示</a> — imread/imwrite/imshow/waitKey</li>\n<li><a href=\"#02-OpenCV%E5%9F%BA%E7%A1%80%2F003-GUI%E4%BA%A4%E4%BA%92%E4%B8%8E%E7%BB%98%E5%9B%BE\" class=\"wiki-link\">003-GUI交互与绘图</a> — 窗口管理、绘图、鼠标、Trackbar</li>\n<li><a href=\"#02-OpenCV%E5%9F%BA%E7%A1%80%2F004-%E5%9B%BE%E5%83%8F%E8%BF%90%E7%AE%97\" class=\"wiki-link\">004-图像运算</a> — 加法和位运算</li>\n\n</ul>\n<h3>图像处理</h3>\n<ul>\n<li><a href=\"#03-%E5%9B%BE%E5%83%8F%E5%A4%84%E7%90%86%2F001-%E8%89%B2%E5%BD%A9%E7%A9%BA%E9%97%B4%E4%B8%8E%E9%80%9A%E9%81%93\" class=\"wiki-link\">001-色彩空间与通道</a> — 色彩空间转换、通道拆分合并</li>\n<li><a href=\"#03-%E5%9B%BE%E5%83%8F%E5%A4%84%E7%90%86%2F002-%E5%87%A0%E4%BD%95%E5%8F%98%E6%8D%A2\" class=\"wiki-link\">002-几何变换</a> — 缩放、翻转、仿射变换、透视变换</li>\n<li><a href=\"#03-%E5%9B%BE%E5%83%8F%E5%A4%84%E7%90%86%2F003-%E5%9B%BE%E5%83%8F%E6%BB%A4%E6%B3%A2%E4%B8%8E%E5%8E%BB%E5%99%AA\" class=\"wiki-link\">003-图像滤波与去噪</a> — 均值/高斯/中值/双边滤波</li>\n<li><a href=\"#03-%E5%9B%BE%E5%83%8F%E5%A4%84%E7%90%86%2F004-%E9%98%88%E5%80%BC%E5%A4%84%E7%90%86\" class=\"wiki-link\">004-阈值处理</a> — 全局阈值、自适应、Otsu、三角算法</li>\n<li><a href=\"#03-%E5%9B%BE%E5%83%8F%E5%A4%84%E7%90%86%2F005-%E5%BD%A2%E6%80%81%E5%AD%A6%E6%93%8D%E4%BD%9C\" class=\"wiki-link\">005-形态学操作</a> — 腐蚀、膨胀、开闭运算、梯度/礼帽/黑帽</li>\n\n</ul>\n<h3>图像分析</h3>\n<ul>\n<li><a href=\"#04-%E5%9B%BE%E5%83%8F%E5%88%86%E6%9E%90%2F001-%E7%9B%B4%E6%96%B9%E5%9B%BE%E5%A4%84%E7%90%86\" class=\"wiki-link\">001-直方图处理</a> — 直方图计算、均衡化、CLAHE</li>\n<li><a href=\"#04-%E5%9B%BE%E5%83%8F%E5%88%86%E6%9E%90%2F002-%E8%BE%B9%E7%BC%98%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">002-边缘检测</a> — Sobel、Laplacian、Canny</li>\n<li><a href=\"#04-%E5%9B%BE%E5%83%8F%E5%88%86%E6%9E%90%2F003-%E8%BD%AE%E5%BB%93%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">003-轮廓检测</a> — 轮廓查找、特征、边界形状</li>\n<li><a href=\"#04-%E5%9B%BE%E5%83%8F%E5%88%86%E6%9E%90%2F004-%E9%9C%8D%E5%A4%AB%E5%8F%98%E6%8D%A2\" class=\"wiki-link\">004-霍夫变换</a> — 直线和圆检测</li>\n<li><a href=\"#04-%E5%9B%BE%E5%83%8F%E5%88%86%E6%9E%90%2F005-%E5%9B%BE%E5%83%8F%E5%88%86%E5%89%B2\" class=\"wiki-link\">005-图像分割</a> — 分水岭、金字塔、GrabCut</li>\n\n</ul>\n<h3>特征检测与匹配</h3>\n<ul>\n<li><a href=\"#05-%E7%89%B9%E5%BE%81%E4%B8%8E%E5%8C%B9%E9%85%8D%2F001-%E7%89%B9%E5%BE%81%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">001-特征检测</a> — Harris、Shi-Tomasi、FAST、SIFT、ORB</li>\n<li><a href=\"#05-%E7%89%B9%E5%BE%81%E4%B8%8E%E5%8C%B9%E9%85%8D%2F002-%E7%89%B9%E5%BE%81%E5%8C%B9%E9%85%8D\" class=\"wiki-link\">002-特征匹配</a> — BFMatcher、FLANN、对象定位</li>\n<li><a href=\"#05-%E7%89%B9%E5%BE%81%E4%B8%8E%E5%8C%B9%E9%85%8D%2F003-%E6%A8%A1%E6%9D%BF%E5%8C%B9%E9%85%8D\" class=\"wiki-link\">003-模板匹配</a> — 单目标/多目标匹配、6种匹配方法</li>\n\n</ul>\n<h3>目标检测与识别</h3>\n<ul>\n<li><a href=\"#06-%E7%9B%AE%E6%A0%87%E6%A3%80%E6%B5%8B%E4%B8%8E%E8%AF%86%E5%88%AB%2F001-%E4%BA%BA%E8%84%B8%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">001-人脸检测</a> — Haar级联、DNN检测</li>\n<li><a href=\"#06-%E7%9B%AE%E6%A0%87%E6%A3%80%E6%B5%8B%E4%B8%8E%E8%AF%86%E5%88%AB%2F002-%E4%BA%BA%E8%84%B8%E8%AF%86%E5%88%AB\" class=\"wiki-link\">002-人脸识别</a> — EigenFaces、FisherFaces、LBPH</li>\n<li><a href=\"#06-%E7%9B%AE%E6%A0%87%E6%A3%80%E6%B5%8B%E4%B8%8E%E8%AF%86%E5%88%AB%2F003-%E5%9B%BE%E5%83%8F%E5%88%86%E7%B1%BB%E4%B8%8E%E6%A3%80%E7%B4%A2\" class=\"wiki-link\">003-图像分类与检索</a> — 分类与检索概念</li>\n\n</ul>\n<h3>机器学习与深度学习</h3>\n<ul>\n<li><a href=\"#07-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E4%B8%8E%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0%2F001-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E5%9F%BA%E7%A1%80\" class=\"wiki-link\">001-机器学习基础</a> — kNN、SVM、k-means</li>\n<li><a href=\"#07-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E4%B8%8E%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0%2F002-%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0%E4%B8%8EDNN\" class=\"wiki-link\">002-深度学习与DNN</a> — 框架、推理流程</li>\n<li><a href=\"#07-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E4%B8%8E%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0%2F003-%E7%89%B9%E5%BE%81%E6%8F%90%E5%8F%96%E6%A6%82%E8%BF%B0\" class=\"wiki-link\">003-特征提取概述</a> — 颜色、纹理、形状、空间特征</li>\n\n</ul>\n<hr>\n\n<h2>🔗 快速导航</h2>\n<ul>\n<li>按标签浏览：<a href=\"#00-ALL%E7%B4%A2%E5%BC%95\" class=\"wiki-link\">00-ALL索引</a></li>\n<li>如果想从基础开始，从 <a href=\"#01-%E5%9F%BA%E7%A1%80%E7%9F%A5%E8%AF%86%2F001-%E6%95%B0%E5%AD%97%E5%9B%BE%E5%83%8F%E5%9F%BA%E7%A1%80\" class=\"wiki-link\">001-数字图像基础</a> 开始阅读</li>\n\n</ul>\n<p><em>共 20+ 篇笔记 | 自动索引见 <a href=\"#00-ALL%E7%B4%A2%E5%BC%95\" class=\"wiki-link\">00-ALL索引</a></em></p>\n"},{"rel":"01-基础知识/001-数字图像基础.md","title":"数字图像基础","tags":["计算机视觉","图像处理","基础概念"],"category":"计算机视觉/基础知识","summary":"数字图像的表示方式、像素概念、灰度与彩色模型及色彩深度","body":"# 数字图像基础\n\n## 像素与灰度\n\n计算机将灰度处理为 **256 级（0~255）**，0 表示黑色，255 表示白色，用一个字节来存储一个像素的值。\n\n## 色彩模型\n\n### RGB 色彩空间\n- **R** 指红色（Red），**G** 指绿色（Green），**B** 指蓝色（Blue）\n- 在表示图像时，有 R、G 和 B 3 个通道，分别对应红色、绿色和蓝色\n- 每个通道中像素的取值范围为 [0,255]，用 3 个通道的像素组合表示彩色图像\n- RGB 色彩空间中颜色通道依次为 R、G、B\n\n### OpenCV 的 BGR 格式\n- **OpenCV 默认的图像格式为 BGR**，即颜色通道依次为 B、G、R\n- OpenCV 中 BGR 格式的图像是一个三维数组\n- 可用数组的索引操作拆分 3 个色彩通道\n- `cv2.split()` 函数拆分通道的效率不如数组索引，在处理较大图像时应优先考虑使用数组索引\n\n### 其他色彩空间\n- **GRAY**：灰度空间，单通道\n- **HSV**：色调（Hue）、饱和度（Saturation）、亮度（Value）\n- **YCrCb**：亮度 + 色度分量\n\n## 图像分辨率与通道数\n- 灰度图像：二维数组 (H×W)\n- 彩色图像：三维数组 (H×W×3)\n- 图像数据类型：uint8 (0-255)\n\n## 关联笔记\n- [[002-OpenCV简介]]\n- [[03-图像处理/001-色彩空间与通道]]","html":"<h1>数字图像基础</h1>\n\n<h2>像素与灰度</h2>\n\n<p>计算机将灰度处理为 <strong>256 级（0~255）</strong>，0 表示黑色，255 表示白色，用一个字节来存储一个像素的值。</p>\n\n<h2>色彩模型</h2>\n\n<h3>RGB 色彩空间</h3>\n<ul>\n<li><strong>R</strong> 指红色（Red），<strong>G</strong> 指绿色（Green），<strong>B</strong> 指蓝色（Blue）</li>\n<li>在表示图像时，有 R、G 和 B 3 个通道，分别对应红色、绿色和蓝色</li>\n<li>每个通道中像素的取值范围为 [0,255]，用 3 个通道的像素组合表示彩色图像</li>\n<li>RGB 色彩空间中颜色通道依次为 R、G、B</li>\n\n</ul>\n<h3>OpenCV 的 BGR 格式</h3>\n<ul>\n<li><strong>OpenCV 默认的图像格式为 BGR</strong>，即颜色通道依次为 B、G、R</li>\n<li>OpenCV 中 BGR 格式的图像是一个三维数组</li>\n<li>可用数组的索引操作拆分 3 个色彩通道</li>\n<li><code>cv2.split()</code> 函数拆分通道的效率不如数组索引，在处理较大图像时应优先考虑使用数组索引</li>\n\n</ul>\n<h3>其他色彩空间</h3>\n<ul>\n<li><strong>GRAY</strong>：灰度空间，单通道</li>\n<li><strong>HSV</strong>：色调（Hue）、饱和度（Saturation）、亮度（Value）</li>\n<li><strong>YCrCb</strong>：亮度 + 色度分量</li>\n\n</ul>\n<h2>图像分辨率与通道数</h2>\n<ul>\n<li>灰度图像：二维数组 (H×W)</li>\n<li>彩色图像：三维数组 (H×W×3)</li>\n<li>图像数据类型：uint8 (0-255)</li>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#002-OpenCV%E7%AE%80%E4%BB%8B\" class=\"wiki-link\">002-OpenCV简介</a></li>\n<li><a href=\"#03-%E5%9B%BE%E5%83%8F%E5%A4%84%E7%90%86%2F001-%E8%89%B2%E5%BD%A9%E7%A9%BA%E9%97%B4%E4%B8%8E%E9%80%9A%E9%81%93\" class=\"wiki-link\">001-色彩空间与通道</a></li>\n</ul>\n"},{"rel":"01-基础知识/002-OpenCV简介.md","title":"OpenCV简介","tags":["计算机视觉","OpenCV","工具库"],"category":"计算机视觉/基础知识","summary":"OpenCV的历史、模块结构、OpenCV-Python的优势及安装使用","body":"# OpenCV 简介\n\n## 概述\n- **OpenCV** 的全称是**开源计算机视觉库**（Open Source Computer Vision Library）\n- 于 1999 年由 Intel 公司的加里·布拉德斯基（Gary Bradski）创建\n- 从 4.5.0 版开始，将以前的 BSD 许可更改为 **Apache2 许可**，允许企业和研究人员自由使用\n- OpenCV 简捷高效，由 C 语言函数和 C++ 类构成\n\n## 主要模块\n| 模块 | 功能 |\n|------|------|\n| `imgcodecs` | 图像的读写功能 |\n| `core` | 各种基本的数据结构 |\n| `highgui` | GUI 界面、窗口管理 |\n| `imgproc` | 图像处理（滤波、变换等） |\n| `features2d` | 特征检测与描述 |\n| `dnn` | 深度学习推理模块 |\n| `ml` | 机器学习模块 |\n| `objdetect` | 目标检测（人脸等） |\n| `video` | 视频处理 |\n| `calib3d` | 相机标定与三维重建 |\n\n## OpenCV-Python\n- Python 是吉多·范罗苏姆创建的一种**面向对象的、解释型**的计算机高级程序设计语言\n- OpenCV-Python 的两大好处：\n  1. 代码运行速度与原始 C/C++ 代码一样快（后台运行实际 C++ 代码）\n  2. 用 Python 编写代码更容易\n\n## 关联笔记\n- [[001-数字图像基础]]\n- [[02-OpenCV基础/002-图像读写与显示]]","html":"<h1>OpenCV 简介</h1>\n\n<h2>概述</h2>\n<ul>\n<li><strong>OpenCV</strong> 的全称是<strong>开源计算机视觉库</strong>（Open Source Computer Vision Library）</li>\n<li>于 1999 年由 Intel 公司的加里·布拉德斯基（Gary Bradski）创建</li>\n<li>从 4.5.0 版开始，将以前的 BSD 许可更改为 <strong>Apache2 许可</strong>，允许企业和研究人员自由使用</li>\n<li>OpenCV 简捷高效，由 C 语言函数和 C++ 类构成</li>\n\n</ul>\n<h2>主要模块</h2>\n<table>\n<tr><td>模块</td><td>功能</td></tr>\n<tr><td><code>imgcodecs</code></td><td>图像的读写功能</td></tr>\n<tr><td><code>core</code></td><td>各种基本的数据结构</td></tr>\n<tr><td><code>highgui</code></td><td>GUI 界面、窗口管理</td></tr>\n<tr><td><code>imgproc</code></td><td>图像处理（滤波、变换等）</td></tr>\n<tr><td><code>features2d</code></td><td>特征检测与描述</td></tr>\n<tr><td><code>dnn</code></td><td>深度学习推理模块</td></tr>\n<tr><td><code>ml</code></td><td>机器学习模块</td></tr>\n<tr><td><code>objdetect</code></td><td>目标检测（人脸等）</td></tr>\n<tr><td><code>video</code></td><td>视频处理</td></tr>\n<tr><td><code>calib3d</code></td><td>相机标定与三维重建</td></tr>\n</table>\n\n<h2>OpenCV-Python</h2>\n<ul>\n<li>Python 是吉多·范罗苏姆创建的一种<strong>面向对象的、解释型</strong>的计算机高级程序设计语言</li>\n<li>OpenCV-Python 的两大好处：</li>\n<p>  1. 代码运行速度与原始 C/C++ 代码一样快（后台运行实际 C++ 代码）</p>\n<p>  2. 用 Python 编写代码更容易</p>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#001-%E6%95%B0%E5%AD%97%E5%9B%BE%E5%83%8F%E5%9F%BA%E7%A1%80\" class=\"wiki-link\">001-数字图像基础</a></li>\n<li><a href=\"#02-OpenCV%E5%9F%BA%E7%A1%80%2F002-%E5%9B%BE%E5%83%8F%E8%AF%BB%E5%86%99%E4%B8%8E%E6%98%BE%E7%A4%BA\" class=\"wiki-link\">002-图像读写与显示</a></li>\n</ul>\n"},{"rel":"02-OpenCV基础/001-NumPy数组.md","title":"NumPy数组基础","tags":["OpenCV","NumPy","Python","数组操作"],"category":"计算机视觉/OpenCV基础","summary":"OpenCV-Python使用NumPy数组存储图像数据，掌握数组创建、形状操作和索引是图像处理的基础","body":"# NumPy 数组基础\n\nOpenCV-Python 需要使用 **NumPy 库**，OpenCV 在程序中使用 NumPy 数组存储图像数据。\n\n## 数据类型\n- NumPy 比 Python 支持更多的数据类型\n- NumPy 还提供了一组表示固定大小的数据类型别名\n- 图像常用 `np.uint8`（0~255）\n\n## 创建数组\n\n| 函数 | 说明 |\n|------|------|\n| `arange()` | 创建数值范围的数组 |\n| `ones()` | 创建元素值全为 1 的数组（单位矩阵） |\n\n## 形状操作\n\n| 操作 | 说明 |\n|------|------|\n| `shape` 属性 | 查看或改变数组的形状 |\n| `reshape()` | 更改数组形状，返回新数组 |\n| `resize()` | 改变形状的同时更改元素个数（refcheck=False 可用） |\n| `np.ravel()` | 将数组转换为一维数组 |\n\n## 索引与切片\n- 多维数组用以逗号分隔的多个值进行索引\n- 支持切片操作，如 `img[100:200, 50:150]`\n\n## 数组运算\n- NumPy 数组与常量执行算术运算和比较运算时，**会对每个数组元素执行计算**\n- **`*` 运算符**用于计算元素乘积\n- **`@` 运算符和 `dot()` 方法**用于计算矩阵乘积\n- NumPy 数组支持 **`+=`、`*=`** 等赋值运算，且会用计算结果覆盖原数组\n\n## 关联笔记\n- [[002-OpenCV简介]]\n- [[002-图像读写与显示]]\n- [[03-图像处理/001-色彩空间与通道]]","html":"<h1>NumPy 数组基础</h1>\n\n<p>OpenCV-Python 需要使用 <strong>NumPy 库</strong>，OpenCV 在程序中使用 NumPy 数组存储图像数据。</p>\n\n<h2>数据类型</h2>\n<ul>\n<li>NumPy 比 Python 支持更多的数据类型</li>\n<li>NumPy 还提供了一组表示固定大小的数据类型别名</li>\n<li>图像常用 <code>np.uint8</code>（0~255）</li>\n\n</ul>\n<h2>创建数组</h2>\n\n<table>\n<tr><td>函数</td><td>说明</td></tr>\n<tr><td><code>arange()</code></td><td>创建数值范围的数组</td></tr>\n<tr><td><code>ones()</code></td><td>创建元素值全为 1 的数组（单位矩阵）</td></tr>\n</table>\n\n<h2>形状操作</h2>\n\n<table>\n<tr><td>操作</td><td>说明</td></tr>\n<tr><td><code>shape</code> 属性</td><td>查看或改变数组的形状</td></tr>\n<tr><td><code>reshape()</code></td><td>更改数组形状，返回新数组</td></tr>\n<tr><td><code>resize()</code></td><td>改变形状的同时更改元素个数（refcheck=False 可用）</td></tr>\n<tr><td><code>np.ravel()</code></td><td>将数组转换为一维数组</td></tr>\n</table>\n\n<h2>索引与切片</h2>\n<ul>\n<li>多维数组用以逗号分隔的多个值进行索引</li>\n<li>支持切片操作，如 <code>img[100:200, 50:150]</code></li>\n\n</ul>\n<h2>数组运算</h2>\n<ul>\n<li>NumPy 数组与常量执行算术运算和比较运算时，<strong>会对每个数组元素执行计算</strong></li>\n<li>*<em><code></em></code> 运算符**用于计算元素乘积</li>\n<li><strong><code>@</code> 运算符和 <code>dot()</code> 方法</strong>用于计算矩阵乘积</li>\n<li>NumPy 数组支持 *<em><code>+=</code>、<code></em>=</code>** 等赋值运算，且会用计算结果覆盖原数组</li>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#002-OpenCV%E7%AE%80%E4%BB%8B\" class=\"wiki-link\">002-OpenCV简介</a></li>\n<li><a href=\"#002-%E5%9B%BE%E5%83%8F%E8%AF%BB%E5%86%99%E4%B8%8E%E6%98%BE%E7%A4%BA\" class=\"wiki-link\">002-图像读写与显示</a></li>\n<li><a href=\"#03-%E5%9B%BE%E5%83%8F%E5%A4%84%E7%90%86%2F001-%E8%89%B2%E5%BD%A9%E7%A9%BA%E9%97%B4%E4%B8%8E%E9%80%9A%E9%81%93\" class=\"wiki-link\">001-色彩空间与通道</a></li>\n</ul>\n"},{"rel":"02-OpenCV基础/002-图像读写与显示.md","title":"图像读写与显示","tags":["OpenCV","图像IO","imread","imshow"],"category":"计算机视觉/OpenCV基础","summary":"OpenCV的图像读写函数imread/imwrite/imshow及waitKey键盘事件处理","body":"# 图像读写与显示\n\n## 图像读取\n- `cv2.imread()` 函数用于将文件中的图像读入内存\n- 支持各种静态图像文件格式：**BMP、PNG、JPEG、TIFF** 等\n- 返回 NumPy 数组（BGR 格式）\n\n## 图像写入\n- `cv2.imwrite()` 函数用于将 NumPy 数组中保存的图像写入文件\n\n## 图像显示\n- `cv2.imshow()` 函数用于在窗口中显示图像\n- 指定的窗口如果不存在，则会按默认设置创建一个窗口，窗口大小由图像大小决定，且不能更改\n\n## 等待键\n- `rv = cv2.waitKey([delay])`\n- `rv`：保存函数返回值，如果没有键被按下，返回 -1；如果有键被按下，返回键的 ASCII 码\n- `delay`：等待按键的时间（毫秒），负数或 0 表示无限等待，默认值为 0\n- 设置了 delay 参数时，等待时间结束时结束等待，函数返回 -1\n\n## 关联笔记\n- [[001-NumPy数组]]\n- [[003-GUI交互与绘图]]","html":"<h1>图像读写与显示</h1>\n\n<h2>图像读取</h2>\n<ul>\n<li><code>cv2.imread()</code> 函数用于将文件中的图像读入内存</li>\n<li>支持各种静态图像文件格式：<strong>BMP、PNG、JPEG、TIFF</strong> 等</li>\n<li>返回 NumPy 数组（BGR 格式）</li>\n\n</ul>\n<h2>图像写入</h2>\n<ul>\n<li><code>cv2.imwrite()</code> 函数用于将 NumPy 数组中保存的图像写入文件</li>\n\n</ul>\n<h2>图像显示</h2>\n<ul>\n<li><code>cv2.imshow()</code> 函数用于在窗口中显示图像</li>\n<li>指定的窗口如果不存在，则会按默认设置创建一个窗口，窗口大小由图像大小决定，且不能更改</li>\n\n</ul>\n<h2>等待键</h2>\n<ul>\n<li><code>rv = cv2.waitKey([delay])</code></li>\n<li><code>rv</code>：保存函数返回值，如果没有键被按下，返回 -1；如果有键被按下，返回键的 ASCII 码</li>\n<li><code>delay</code>：等待按键的时间（毫秒），负数或 0 表示无限等待，默认值为 0</li>\n<li>设置了 delay 参数时，等待时间结束时结束等待，函数返回 -1</li>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#001-NumPy%E6%95%B0%E7%BB%84\" class=\"wiki-link\">001-NumPy数组</a></li>\n<li><a href=\"#003-GUI%E4%BA%A4%E4%BA%92%E4%B8%8E%E7%BB%98%E5%9B%BE\" class=\"wiki-link\">003-GUI交互与绘图</a></li>\n</ul>\n"},{"rel":"02-OpenCV基础/003-GUI交互与绘图.md","title":"GUI交互与绘图","tags":["OpenCV","GUI","绘图","鼠标事件","Trackbar"],"category":"计算机视觉/OpenCV基础","summary":"OpenCV窗口管理、绘图函数、鼠标事件处理和跟踪栏的创建与使用","body":"# GUI 交互与绘图\n\n## 窗口管理\n| 函数 | 说明 |\n|------|------|\n| `cv2.namedWindow()` | 创建窗口 |\n| `cv2.destroyAllWindows()` | 关闭所有窗口 |\n| `cv2.destroyWindow(winname)` | 关闭指定名称的窗口 |\n| `cv2.resizeWindow()` | 更改窗口大小 |\n\n## 绘图函数\n| 函数 | 说明 |\n|------|------|\n| `cv2.line()` | 绘制直线 |\n| `cv2.rectangle()` | 绘制矩形 |\n| `cv2.circle()` | 绘制圆 |\n| `cv2.ellipse()` | 绘制椭圆 |\n| `cv2.polylines()` | 绘制多边形 |\n| `cv2.putText()` | 绘制文本（注意：OpenCV 默认不能直接绘制中文） |\n\n## 鼠标事件处理\n- OpenCV 可在用户触发鼠标事件时，调用**鼠标回调函数**完成事件处理\n- 触发鼠标事件时，鼠标拖动或键盘按键操作\n\n## 跟踪栏（Trackbar）\n- 跟踪栏是 OpenCV 为图像窗口提供的交互工具\n- 用户可以通过跟踪栏中的滑块位置获取特定范围内的值\n- `cv2.createTrackbar()` 函数用于创建跟踪栏\n\n## 关联笔记\n- [[002-图像读写与显示]]","html":"<h1>GUI 交互与绘图</h1>\n\n<h2>窗口管理</h2>\n<table>\n<tr><td>函数</td><td>说明</td></tr>\n<tr><td><code>cv2.namedWindow()</code></td><td>创建窗口</td></tr>\n<tr><td><code>cv2.destroyAllWindows()</code></td><td>关闭所有窗口</td></tr>\n<tr><td><code>cv2.destroyWindow(winname)</code></td><td>关闭指定名称的窗口</td></tr>\n<tr><td><code>cv2.resizeWindow()</code></td><td>更改窗口大小</td></tr>\n</table>\n\n<h2>绘图函数</h2>\n<table>\n<tr><td>函数</td><td>说明</td></tr>\n<tr><td><code>cv2.line()</code></td><td>绘制直线</td></tr>\n<tr><td><code>cv2.rectangle()</code></td><td>绘制矩形</td></tr>\n<tr><td><code>cv2.circle()</code></td><td>绘制圆</td></tr>\n<tr><td><code>cv2.ellipse()</code></td><td>绘制椭圆</td></tr>\n<tr><td><code>cv2.polylines()</code></td><td>绘制多边形</td></tr>\n<tr><td><code>cv2.putText()</code></td><td>绘制文本（注意：OpenCV 默认不能直接绘制中文）</td></tr>\n</table>\n\n<h2>鼠标事件处理</h2>\n<ul>\n<li>OpenCV 可在用户触发鼠标事件时，调用<strong>鼠标回调函数</strong>完成事件处理</li>\n<li>触发鼠标事件时，鼠标拖动或键盘按键操作</li>\n\n</ul>\n<h2>跟踪栏（Trackbar）</h2>\n<ul>\n<li>跟踪栏是 OpenCV 为图像窗口提供的交互工具</li>\n<li>用户可以通过跟踪栏中的滑块位置获取特定范围内的值</li>\n<li><code>cv2.createTrackbar()</code> 函数用于创建跟踪栏</li>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#002-%E5%9B%BE%E5%83%8F%E8%AF%BB%E5%86%99%E4%B8%8E%E6%98%BE%E7%A4%BA\" class=\"wiki-link\">002-图像读写与显示</a></li>\n</ul>\n"},{"rel":"02-OpenCV基础/004-图像运算.md","title":"图像运算","tags":["OpenCV","图像运算","加法","位运算"],"category":"计算机视觉/OpenCV基础","summary":"图像的算术运算、加权加法和按位逻辑运算","body":"# 图像运算\n\n## 加法运算\n- 加法运算符 **`+`** 和 **`cv2.add()`** 函数都可用于执行图像加法运算\n- **区别**：\n  - 用 `+` 运算符执行两个图像数组加法时，如果两个像素相加大于 256，则会将其**按 256 取模**\n  - `cv2.add()` 函数执行两个图像数组加法时，如果两个像素相加大于 256，则取 **255**（饱和处理）\n\n## 加权加法\n- `cv2.addWeighted()` 函数可执行图像的加权加法运算\n\n## 按位逻辑运算\n| 函数 | 说明 |\n|------|------|\n| `cv2.bitwise_and(src1, src2[, mask])` | mask 对应的位不为 0 时，执行按位与 |\n| `cv2.bitwise_or(src1, src2[, mask])` | mask 对应的位不为 0 时，执行按位或 |\n| `cv2.bitwise_not(src1[, mask])` | mask 对应的位不为 0 时，执行按位取反 |\n| `cv2.bitwise_xor(src1, src2[, mask])` | mask 对应的位不为 0 时，执行按位异或 |\n\n## 关联笔记\n- [[001-NumPy数组]]\n- [[03-图像处理/001-色彩空间与通道]]","html":"<h1>图像运算</h1>\n\n<h2>加法运算</h2>\n<ul>\n<li>加法运算符 <strong><code>+</code></strong> 和 <strong><code>cv2.add()</code></strong> 函数都可用于执行图像加法运算</li>\n<li><strong>区别</strong>：</li>\n<p>  - 用 <code>+</code> 运算符执行两个图像数组加法时，如果两个像素相加大于 256，则会将其<strong>按 256 取模</strong></p>\n<p>  - <code>cv2.add()</code> 函数执行两个图像数组加法时，如果两个像素相加大于 256，则取 <strong>255</strong>（饱和处理）</p>\n\n</ul>\n<h2>加权加法</h2>\n<ul>\n<li><code>cv2.addWeighted()</code> 函数可执行图像的加权加法运算</li>\n\n</ul>\n<h2>按位逻辑运算</h2>\n<table>\n<tr><td>函数</td><td>说明</td></tr>\n<tr><td><code>cv2.bitwise_and(src1, src2[, mask])</code></td><td>mask 对应的位不为 0 时，执行按位与</td></tr>\n<tr><td><code>cv2.bitwise_or(src1, src2[, mask])</code></td><td>mask 对应的位不为 0 时，执行按位或</td></tr>\n<tr><td><code>cv2.bitwise_not(src1[, mask])</code></td><td>mask 对应的位不为 0 时，执行按位取反</td></tr>\n<tr><td><code>cv2.bitwise_xor(src1, src2[, mask])</code></td><td>mask 对应的位不为 0 时，执行按位异或</td></tr>\n</table>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#001-NumPy%E6%95%B0%E7%BB%84\" class=\"wiki-link\">001-NumPy数组</a></li>\n<li><a href=\"#03-%E5%9B%BE%E5%83%8F%E5%A4%84%E7%90%86%2F001-%E8%89%B2%E5%BD%A9%E7%A9%BA%E9%97%B4%E4%B8%8E%E9%80%9A%E9%81%93\" class=\"wiki-link\">001-色彩空间与通道</a></li>\n</ul>\n"},{"rel":"03-图像处理/001-色彩空间与通道.md","title":"色彩空间与通道","tags":["OpenCV","图像处理","色彩空间","BGR","HSV"],"category":"计算机视觉/图像处理","summary":"色彩空间转换、通道拆分与合并操作","body":"# 色彩空间与通道\n\n## 色彩空间转换\n使用 `cv2.cvtColor()` 函数进行色彩空间转换：\n\n| 转换码 | 说明 |\n|--------|------|\n| `cv2.COLOR_BGR2RGB` | BGR → RGB |\n| `cv2.COLOR_BGR2GRAY` | BGR → 灰度 |\n| `cv2.COLOR_BGR2HSV` | BGR → HSV |\n| `cv2.COLOR_BGR2YCrCb` | BGR → YCrCb |\n\n## 通道拆分与合并\n- OpenCV 中 BGR 格式的图像是一个**三维数组**，可用数组的索引操作拆分 3 个色彩通道\n- `cv2.split()` 函数拆分通道——**效率不如数组索引**，处理较大图像时应优先使用数组索引\n- `cv2.merge()` 函数可将 3 通道图像合并\n\n## 关联笔记\n- [[01-基础知识/001-数字图像基础]]\n- [[002-几何变换]]","html":"<h1>色彩空间与通道</h1>\n\n<h2>色彩空间转换</h2>\n<p>使用 <code>cv2.cvtColor()</code> 函数进行色彩空间转换：</p>\n\n<table>\n<tr><td>转换码</td><td>说明</td></tr>\n<tr><td><code>cv2.COLOR_BGR2RGB</code></td><td>BGR → RGB</td></tr>\n<tr><td><code>cv2.COLOR_BGR2GRAY</code></td><td>BGR → 灰度</td></tr>\n<tr><td><code>cv2.COLOR_BGR2HSV</code></td><td>BGR → HSV</td></tr>\n<tr><td><code>cv2.COLOR_BGR2YCrCb</code></td><td>BGR → YCrCb</td></tr>\n</table>\n\n<h2>通道拆分与合并</h2>\n<ul>\n<li>OpenCV 中 BGR 格式的图像是一个<strong>三维数组</strong>，可用数组的索引操作拆分 3 个色彩通道</li>\n<li><code>cv2.split()</code> 函数拆分通道——<strong>效率不如数组索引</strong>，处理较大图像时应优先使用数组索引</li>\n<li><code>cv2.merge()</code> 函数可将 3 通道图像合并</li>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#01-%E5%9F%BA%E7%A1%80%E7%9F%A5%E8%AF%86%2F001-%E6%95%B0%E5%AD%97%E5%9B%BE%E5%83%8F%E5%9F%BA%E7%A1%80\" class=\"wiki-link\">001-数字图像基础</a></li>\n<li><a href=\"#002-%E5%87%A0%E4%BD%95%E5%8F%98%E6%8D%A2\" class=\"wiki-link\">002-几何变换</a></li>\n</ul>\n"},{"rel":"03-图像处理/002-几何变换.md","title":"几何变换","tags":["OpenCV","图像处理","几何变换","仿射变换","透视变换"],"category":"计算机视觉/图像处理","summary":"图像缩放、翻转、仿射变换（平移/旋转/缩放）和透视变换","body":"# 几何变换\n\n## 缩放与翻转\n- `cv2.resize()` 函数用于缩放图像\n- `cv2.flip()` 函数用于翻转图像\n\n## 仿射变换\n- 仿射变换包含了**平移、旋转、缩放**等操作\n- 主要特点：原图像中的所有**平行线在转换后的图像中仍然平行**\n- `cv2.warpAffine()` 函数用于实现图像的仿射变换\n\n### 平移\n- 图像水平移动 `m` 个像素，垂直移动 `n` 个像素\n- 转换矩阵：`M = [[1,0,m],[0,1,n]]`\n\n### 缩放\n- 宽度缩放比例为 `h`，高度缩放比例为 `v`\n- 转换矩阵：`M = [[h,0,0],[0,v,0]]`\n\n### 旋转\n- `cv2.getRotationMatrix2D()` 函数用于计算执行旋转操作的转换矩阵\n\n### 三点映射\n- 将图像转换为任意的平行四边形\n- `cv2.getAffineTransform()` 函数用于计算其转换矩阵\n\n## 透视变换\n- 将图像转换为任意的四边形\n- 主要特点：原始图像中的所有**直线在转换后的图像中仍然是直线**\n- `cv2.warpPerspective()` 函数用于执行透视变换操作\n\n## 关联笔记\n- [[001-色彩空间与通道]]\n- [[003-图像滤波与去噪]]","html":"<h1>几何变换</h1>\n\n<h2>缩放与翻转</h2>\n<ul>\n<li><code>cv2.resize()</code> 函数用于缩放图像</li>\n<li><code>cv2.flip()</code> 函数用于翻转图像</li>\n\n</ul>\n<h2>仿射变换</h2>\n<ul>\n<li>仿射变换包含了<strong>平移、旋转、缩放</strong>等操作</li>\n<li>主要特点：原图像中的所有<strong>平行线在转换后的图像中仍然平行</strong></li>\n<li><code>cv2.warpAffine()</code> 函数用于实现图像的仿射变换</li>\n\n</ul>\n<h3>平移</h3>\n<ul>\n<li>图像水平移动 <code>m</code> 个像素，垂直移动 <code>n</code> 个像素</li>\n<li>转换矩阵：<code>M = [[1,0,m],[0,1,n]]</code></li>\n\n</ul>\n<h3>缩放</h3>\n<ul>\n<li>宽度缩放比例为 <code>h</code>，高度缩放比例为 <code>v</code></li>\n<li>转换矩阵：<code>M = [[h,0,0],[0,v,0]]</code></li>\n\n</ul>\n<h3>旋转</h3>\n<ul>\n<li><code>cv2.getRotationMatrix2D()</code> 函数用于计算执行旋转操作的转换矩阵</li>\n\n</ul>\n<h3>三点映射</h3>\n<ul>\n<li>将图像转换为任意的平行四边形</li>\n<li><code>cv2.getAffineTransform()</code> 函数用于计算其转换矩阵</li>\n\n</ul>\n<h2>透视变换</h2>\n<ul>\n<li>将图像转换为任意的四边形</li>\n<li>主要特点：原始图像中的所有<strong>直线在转换后的图像中仍然是直线</strong></li>\n<li><code>cv2.warpPerspective()</code> 函数用于执行透视变换操作</li>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#001-%E8%89%B2%E5%BD%A9%E7%A9%BA%E9%97%B4%E4%B8%8E%E9%80%9A%E9%81%93\" class=\"wiki-link\">001-色彩空间与通道</a></li>\n<li><a href=\"#003-%E5%9B%BE%E5%83%8F%E6%BB%A4%E6%B3%A2%E4%B8%8E%E5%8E%BB%E5%99%AA\" class=\"wiki-link\">003-图像滤波与去噪</a></li>\n</ul>\n"},{"rel":"03-图像处理/003-图像滤波与去噪.md","title":"图像滤波与去噪","tags":["OpenCV","图像处理","滤波","去噪","高斯滤波","中值滤波"],"category":"计算机视觉/图像处理","summary":"OpenCV支持的5种滤波方法：均值、高斯、方框、中值、双边滤波及2D卷积","body":"# 图像滤波与去噪\n\nOpenCV 支持多种滤波操作，各有不同的适用场景。\n\n## 均值滤波\n- 以当前点为中心，用其周围 **N×N** 个点像素值的**平均值**来替代当前点的像素值\n- 用于计算平均值的 N×N 个点称为**邻域**\n- `cv2.blur()` 函数用于实现均值滤波\n\n## 高斯滤波\n- 按像素点与中心点的不同距离，赋予像素点不同的权重值：\n  - 越靠近中心点权重值越大\n  - 越远离中心点权重值越小\n- 根据权重值计算邻域内所有像素点的和，将和作为中心点的像素值\n- `cv2.GaussianBlur()` 函数用于实现高斯滤波\n\n## 方框滤波\n- 以均值滤波为基础，可选择是否对滤波结果进行归一化\n- 选择归一化 → 结果为邻域内点像素值的**平均值**\n- 不选择归一化 → 结果为邻域内点像素值的**和**\n- `cv2.boxFilter()` 函数用于实现方框滤波\n\n## 中值滤波\n- 将邻域内的所有像素值排序，取**中间值**作为邻域中心点的像素值\n- 对**椒盐噪声**效果极佳\n- `cv2.medianBlur()` 函数用于实现中值滤波\n\n## 双边滤波\n- 在计算像素值的同时会考虑**距离和色差信息**\n- 可在消除噪声的同时**保护边缘信息**\n- 色差较小的像素 → 赋予较大权重；色差较大的像素 → 赋予较小权重\n- `cv2.bilateralFilter()` 函数用于实现双边滤波\n\n## 2D 卷积\n- 以上滤波可通过参数确定卷积核\n- 2D 卷积可使用**自定义的卷积核**来执行滤波操作\n- `cv2.filter2D()` 函数用于实现 2D 卷积\n\n## 关联笔记\n- [[002-几何变换]]\n- [[004-阈值处理]]\n- [[04-图像分析/002-边缘检测]]","html":"<h1>图像滤波与去噪</h1>\n\n<p>OpenCV 支持多种滤波操作，各有不同的适用场景。</p>\n\n<h2>均值滤波</h2>\n<ul>\n<li>以当前点为中心，用其周围 <strong>N×N</strong> 个点像素值的<strong>平均值</strong>来替代当前点的像素值</li>\n<li>用于计算平均值的 N×N 个点称为<strong>邻域</strong></li>\n<li><code>cv2.blur()</code> 函数用于实现均值滤波</li>\n\n</ul>\n<h2>高斯滤波</h2>\n<ul>\n<li>按像素点与中心点的不同距离，赋予像素点不同的权重值：</li>\n<p>  - 越靠近中心点权重值越大</p>\n<p>  - 越远离中心点权重值越小</p>\n<li>根据权重值计算邻域内所有像素点的和，将和作为中心点的像素值</li>\n<li><code>cv2.GaussianBlur()</code> 函数用于实现高斯滤波</li>\n\n</ul>\n<h2>方框滤波</h2>\n<ul>\n<li>以均值滤波为基础，可选择是否对滤波结果进行归一化</li>\n<li>选择归一化 → 结果为邻域内点像素值的<strong>平均值</strong></li>\n<li>不选择归一化 → 结果为邻域内点像素值的<strong>和</strong></li>\n<li><code>cv2.boxFilter()</code> 函数用于实现方框滤波</li>\n\n</ul>\n<h2>中值滤波</h2>\n<ul>\n<li>将邻域内的所有像素值排序，取<strong>中间值</strong>作为邻域中心点的像素值</li>\n<li>对<strong>椒盐噪声</strong>效果极佳</li>\n<li><code>cv2.medianBlur()</code> 函数用于实现中值滤波</li>\n\n</ul>\n<h2>双边滤波</h2>\n<ul>\n<li>在计算像素值的同时会考虑<strong>距离和色差信息</strong></li>\n<li>可在消除噪声的同时<strong>保护边缘信息</strong></li>\n<li>色差较小的像素 → 赋予较大权重；色差较大的像素 → 赋予较小权重</li>\n<li><code>cv2.bilateralFilter()</code> 函数用于实现双边滤波</li>\n\n</ul>\n<h2>2D 卷积</h2>\n<ul>\n<li>以上滤波可通过参数确定卷积核</li>\n<li>2D 卷积可使用<strong>自定义的卷积核</strong>来执行滤波操作</li>\n<li><code>cv2.filter2D()</code> 函数用于实现 2D 卷积</li>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#002-%E5%87%A0%E4%BD%95%E5%8F%98%E6%8D%A2\" class=\"wiki-link\">002-几何变换</a></li>\n<li><a href=\"#004-%E9%98%88%E5%80%BC%E5%A4%84%E7%90%86\" class=\"wiki-link\">004-阈值处理</a></li>\n<li><a href=\"#04-%E5%9B%BE%E5%83%8F%E5%88%86%E6%9E%90%2F002-%E8%BE%B9%E7%BC%98%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">002-边缘检测</a></li>\n</ul>\n"},{"rel":"03-图像处理/004-阈值处理.md","title":"阈值处理","tags":["OpenCV","图像处理","阈值","二值化","Otsu"],"category":"计算机视觉/图像处理","summary":"全局阈值处理、自适应阈值处理、Otsu算法和三角算法","body":"# 阈值处理\n\n## 全局阈值处理\n将大于阈值的像素值设置为 255，将其他像素值设置为 0（或相反）。\n\n`cv2.threshold()` 函数的 `type` 参数：\n\n| 类型 | 说明 |\n|------|------|\n| `cv2.THRESH_BINARY` | 二值化：大于阈值 → 255，其他 → 0 |\n| `cv2.THRESH_BINARY_INV` | 反二值化：大于阈值 → 0，其他 → 255 |\n| `cv2.THRESH_TRUNC` | 截断：大于阈值 → 设为阈值，其他不变 |\n| `cv2.THRESH_TOZERO` | 超阈值零处理：大于阈值 → 0，其他不变 |\n| `cv2.THRESH_TOZERO_INV` | 低阈值零处理：小于阈值 → 0，其他不变 |\n\n## Otsu 算法\n- 对于色彩不均衡的图像，Otsu 算法更优\n- 遍历当前图像的所有阈值，再选择最佳阈值\n- 在 `cv2.threshold()` 的 type 参数后加上 `cv2.THRESH_OTSU`\n\n## 三角算法（TRIANGLE）\n- `cv2.threshold()` 通过在阈值类型参数后加上 `cv2.THRESH_TRIANGLE` 来实现\n\n## 自适应阈值处理\n- 也称**局部阈值处理**\n- 通过计算每个像素点邻域的加权平均值来确定阈值，并用该阈值处理当前像素点\n- 全局阈值处理适用于色彩均衡的图像\n- **自适应阈值处理适用于明暗差异较大的图像**\n- `cv2.adaptiveThreshold()` 函数用于实现\n\n## 关联笔记\n- [[003-图像滤波与去噪]]\n- [[005-形态学操作]]\n- [[04-图像分析/005-图像分割]]","html":"<h1>阈值处理</h1>\n\n<h2>全局阈值处理</h2>\n<p>将大于阈值的像素值设置为 255，将其他像素值设置为 0（或相反）。</p>\n\n<p><code>cv2.threshold()</code> 函数的 <code>type</code> 参数：</p>\n\n<table>\n<tr><td>类型</td><td>说明</td></tr>\n<tr><td><code>cv2.THRESH_BINARY</code></td><td>二值化：大于阈值 → 255，其他 → 0</td></tr>\n<tr><td><code>cv2.THRESH_BINARY_INV</code></td><td>反二值化：大于阈值 → 0，其他 → 255</td></tr>\n<tr><td><code>cv2.THRESH_TRUNC</code></td><td>截断：大于阈值 → 设为阈值，其他不变</td></tr>\n<tr><td><code>cv2.THRESH_TOZERO</code></td><td>超阈值零处理：大于阈值 → 0，其他不变</td></tr>\n<tr><td><code>cv2.THRESH_TOZERO_INV</code></td><td>低阈值零处理：小于阈值 → 0，其他不变</td></tr>\n</table>\n\n<h2>Otsu 算法</h2>\n<ul>\n<li>对于色彩不均衡的图像，Otsu 算法更优</li>\n<li>遍历当前图像的所有阈值，再选择最佳阈值</li>\n<li>在 <code>cv2.threshold()</code> 的 type 参数后加上 <code>cv2.THRESH_OTSU</code></li>\n\n</ul>\n<h2>三角算法（TRIANGLE）</h2>\n<ul>\n<li><code>cv2.threshold()</code> 通过在阈值类型参数后加上 <code>cv2.THRESH_TRIANGLE</code> 来实现</li>\n\n</ul>\n<h2>自适应阈值处理</h2>\n<ul>\n<li>也称<strong>局部阈值处理</strong></li>\n<li>通过计算每个像素点邻域的加权平均值来确定阈值，并用该阈值处理当前像素点</li>\n<li>全局阈值处理适用于色彩均衡的图像</li>\n<li><strong>自适应阈值处理适用于明暗差异较大的图像</strong></li>\n<li><code>cv2.adaptiveThreshold()</code> 函数用于实现</li>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#003-%E5%9B%BE%E5%83%8F%E6%BB%A4%E6%B3%A2%E4%B8%8E%E5%8E%BB%E5%99%AA\" class=\"wiki-link\">003-图像滤波与去噪</a></li>\n<li><a href=\"#005-%E5%BD%A2%E6%80%81%E5%AD%A6%E6%93%8D%E4%BD%9C\" class=\"wiki-link\">005-形态学操作</a></li>\n<li><a href=\"#04-%E5%9B%BE%E5%83%8F%E5%88%86%E6%9E%90%2F005-%E5%9B%BE%E5%83%8F%E5%88%86%E5%89%B2\" class=\"wiki-link\">005-图像分割</a></li>\n</ul>\n"},{"rel":"03-图像处理/005-形态学操作.md","title":"形态学操作","tags":["OpenCV","图像处理","形态学","腐蚀","膨胀","开运算","闭运算"],"category":"计算机视觉/图像处理","summary":"腐蚀与膨胀的基础操作，以及开运算、闭运算、梯度、礼帽、黑帽等高级形态操作","body":"# 形态学操作\n\n形态操作会使用一个**内核**（也称结构元）遍历图像，根据内核和图像的位置关系决定内核中心对应的图像像素点的输出结果。内核可以是自定义的矩阵（NumPy 数组），或 `cv2.getStructuringElement()` 返回的矩阵。\n\n## 腐蚀（Erosion）\n- 依次将内核中心对准每一个单元格\n- **内核部分或全部处于前景之外** → 内核中心对应单元格的值为 0\n- **只有内核完全处于前景内部** → 内核中心对应单元格的值为 1\n- 通过腐蚀操作，**图像的边界被侵蚀，白色区域缩小**\n- `cv2.erode()` 函数\n\n## 膨胀（Dilation）\n- 与腐蚀相反，对图像的边界进行扩张\n- **只有内核完全处于前景外部** → 值为 0，否则为 1\n- 通过膨胀操作，**图像的边界被扩张，白色区域增大**\n- `cv2.dilate()` 函数\n\n## 高级形态操作\n通过 `cv2.morphologyEx()` 函数实现：\n\n| 操作 | 说明 |\n|------|------|\n| **开运算** | 先腐蚀后膨胀 → 去除细小噪点 |\n| **闭运算** | 先膨胀后腐蚀 → 填补小孔洞 |\n| **形态学梯度** | 膨胀结果 - 腐蚀结果 → 轮廓提取 |\n| **礼帽（Top Hat）** | 原图 - 开运算结果 → 提取亮噪点 |\n| **黑帽（Black Hat）** | 闭运算结果 - 原图 → 提取暗噪点 |\n\n## 关联笔记\n- [[004-阈值处理]]\n- [[04-图像分析/002-边缘检测]]\n- [[04-图像分析/005-图像分割]]","html":"<h1>形态学操作</h1>\n\n<p>形态操作会使用一个<strong>内核</strong>（也称结构元）遍历图像，根据内核和图像的位置关系决定内核中心对应的图像像素点的输出结果。内核可以是自定义的矩阵（NumPy 数组），或 <code>cv2.getStructuringElement()</code> 返回的矩阵。</p>\n\n<h2>腐蚀（Erosion）</h2>\n<ul>\n<li>依次将内核中心对准每一个单元格</li>\n<li><strong>内核部分或全部处于前景之外</strong> → 内核中心对应单元格的值为 0</li>\n<li><strong>只有内核完全处于前景内部</strong> → 内核中心对应单元格的值为 1</li>\n<li>通过腐蚀操作，<strong>图像的边界被侵蚀，白色区域缩小</strong></li>\n<li><code>cv2.erode()</code> 函数</li>\n\n</ul>\n<h2>膨胀（Dilation）</h2>\n<ul>\n<li>与腐蚀相反，对图像的边界进行扩张</li>\n<li><strong>只有内核完全处于前景外部</strong> → 值为 0，否则为 1</li>\n<li>通过膨胀操作，<strong>图像的边界被扩张，白色区域增大</strong></li>\n<li><code>cv2.dilate()</code> 函数</li>\n\n</ul>\n<h2>高级形态操作</h2>\n<p>通过 <code>cv2.morphologyEx()</code> 函数实现：</p>\n\n<table>\n<tr><td>操作</td><td>说明</td></tr>\n<tr><td><strong>开运算</strong></td><td>先腐蚀后膨胀 → 去除细小噪点</td></tr>\n<tr><td><strong>闭运算</strong></td><td>先膨胀后腐蚀 → 填补小孔洞</td></tr>\n<tr><td><strong>形态学梯度</strong></td><td>膨胀结果 - 腐蚀结果 → 轮廓提取</td></tr>\n<tr><td><strong>礼帽（Top Hat）</strong></td><td>原图 - 开运算结果 → 提取亮噪点</td></tr>\n<tr><td><strong>黑帽（Black Hat）</strong></td><td>闭运算结果 - 原图 → 提取暗噪点</td></tr>\n</table>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#004-%E9%98%88%E5%80%BC%E5%A4%84%E7%90%86\" class=\"wiki-link\">004-阈值处理</a></li>\n<li><a href=\"#04-%E5%9B%BE%E5%83%8F%E5%88%86%E6%9E%90%2F002-%E8%BE%B9%E7%BC%98%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">002-边缘检测</a></li>\n<li><a href=\"#04-%E5%9B%BE%E5%83%8F%E5%88%86%E6%9E%90%2F005-%E5%9B%BE%E5%83%8F%E5%88%86%E5%89%B2\" class=\"wiki-link\">005-图像分割</a></li>\n</ul>\n"},{"rel":"04-图像分析/001-直方图处理.md","title":"直方图处理","tags":["OpenCV","图像分析","直方图","均衡化","CLAHE"],"category":"计算机视觉/图像分析","summary":"直方图的概念、计算、绘制、均衡化及限制对比度自适应直方图均衡化","body":"# 直方图处理\n\n## 直方图概念\n直方图用于统计图像内各个灰度级出现的次数：\n- **横坐标**：图像像素的灰度级\n- **纵坐标**：像素灰度级的数量\n\n### 三个关键概念\n| 概念 | 说明 |\n|------|------|\n| **RANGE** | 要统计的灰度级范围，一般为 [0,255] |\n| **BINS** | 灰度级的分组数量。如将 [0,255] 按 16 个灰度级分组，则 BINS = 16 |\n| **DIMS** | 绘制直方图时采集的参数数量，一般 DIMS = 1 |\n\n## 绘制直方图\n- `matplotlib.pyplot.hist()` 函数可根据图像绘制直方图\n- NumPy 的 `histogram()` 函数可用于计算直方图：`hist, bin_edges = np.histogram(src, bins, range)`\n\n## 掩模（Mask）\n掩模图像为黑底，其中的白色区域可视为透明区域。将其覆盖到原图像上，原图像中可显示出来的部分为掩模结果图像。\n\n## 直方图均衡化\n通过调整图像的灰度来提高图像的对比度。\n\n### 普通直方图均衡化\n- 将原图像的灰度级均匀地映射到全部灰度级范围内\n- `cv2.equalizeHist(src)` 函数\n- **局限**：对图像全局调整，不能有效提高局部对比度\n\n### 自适应直方图均衡化（CLAHE）\n- 将图像分成若干子块，对子块进行直方图均衡化\n- 自适应直方图均衡化可能造成局部对比度过高导致图像失真\n- **限制对比度自适应直方图均衡化（CLAHE）**解决此问题\n- `cv2.createCLAHE()` 函数用于创建 CLAHE 对象\n\n## 二维直方图\n统计两个维度的信息（如色相和饱和度）。\n\n## 关联笔记\n- [[004-阈值处理]]\n- [[03-图像处理/003-图像滤波与去噪]]","html":"<h1>直方图处理</h1>\n\n<h2>直方图概念</h2>\n<p>直方图用于统计图像内各个灰度级出现的次数：</p>\n<ul>\n<li><strong>横坐标</strong>：图像像素的灰度级</li>\n<li><strong>纵坐标</strong>：像素灰度级的数量</li>\n\n</ul>\n<h3>三个关键概念</h3>\n<table>\n<tr><td>概念</td><td>说明</td></tr>\n<tr><td><strong>RANGE</strong></td><td>要统计的灰度级范围，一般为 [0,255]</td></tr>\n<tr><td><strong>BINS</strong></td><td>灰度级的分组数量。如将 [0,255] 按 16 个灰度级分组，则 BINS = 16</td></tr>\n<tr><td><strong>DIMS</strong></td><td>绘制直方图时采集的参数数量，一般 DIMS = 1</td></tr>\n</table>\n\n<h2>绘制直方图</h2>\n<ul>\n<li><code>matplotlib.pyplot.hist()</code> 函数可根据图像绘制直方图</li>\n<li>NumPy 的 <code>histogram()</code> 函数可用于计算直方图：<code>hist, bin_edges = np.histogram(src, bins, range)</code></li>\n\n</ul>\n<h2>掩模（Mask）</h2>\n<p>掩模图像为黑底，其中的白色区域可视为透明区域。将其覆盖到原图像上，原图像中可显示出来的部分为掩模结果图像。</p>\n\n<h2>直方图均衡化</h2>\n<p>通过调整图像的灰度来提高图像的对比度。</p>\n\n<h3>普通直方图均衡化</h3>\n<ul>\n<li>将原图像的灰度级均匀地映射到全部灰度级范围内</li>\n<li><code>cv2.equalizeHist(src)</code> 函数</li>\n<li><strong>局限</strong>：对图像全局调整，不能有效提高局部对比度</li>\n\n</ul>\n<h3>自适应直方图均衡化（CLAHE）</h3>\n<ul>\n<li>将图像分成若干子块，对子块进行直方图均衡化</li>\n<li>自适应直方图均衡化可能造成局部对比度过高导致图像失真</li>\n<li><strong>限制对比度自适应直方图均衡化（CLAHE）</strong>解决此问题</li>\n<li><code>cv2.createCLAHE()</code> 函数用于创建 CLAHE 对象</li>\n\n</ul>\n<h2>二维直方图</h2>\n<p>统计两个维度的信息（如色相和饱和度）。</p>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#004-%E9%98%88%E5%80%BC%E5%A4%84%E7%90%86\" class=\"wiki-link\">004-阈值处理</a></li>\n<li><a href=\"#03-%E5%9B%BE%E5%83%8F%E5%A4%84%E7%90%86%2F003-%E5%9B%BE%E5%83%8F%E6%BB%A4%E6%B3%A2%E4%B8%8E%E5%8E%BB%E5%99%AA\" class=\"wiki-link\">003-图像滤波与去噪</a></li>\n</ul>\n"},{"rel":"04-图像分析/002-边缘检测.md","title":"边缘检测","tags":["OpenCV","边缘检测","Sobel","Laplacian","Canny"],"category":"计算机视觉/图像分析","summary":"Sobel、Laplacian和Canny三种边缘检测方法的原理与使用","body":"# 边缘检测\n\n## Laplacian（拉普拉斯）边缘检测\n- 使用图像矩阵与拉普拉斯核进行卷积运算\n- 本质：计算图像中任意一点与其在水平方向和垂直方向上 4 个相邻点平均值的差值\n- **二阶导数算子**\n- `cv2.Laplacian()` 函数\n\n## Sobel 边缘检测\n- 将**高斯滤波和微分**结合起来执行图像卷积运算\n- 具有一定的抗噪性\n- **一阶导数算子**（包括 Roberts、Prewitt、Sobel）\n- `cv2.Sobel()` 函数\n\n## Canny 边缘检测\nLaplacian 和 Sobel 算法简单，但结果可能损失过多边缘信息或有很多噪声。**Canny 算法更复杂**，包含 5 个步骤：\n\n1. 使用**高斯滤波**去除图像噪声\n2. 使用 **Sobel 核**进行滤波，计算梯度\n3. 在边缘使用**非最大值抑制**（Non-maximum Suppression）\n4. 对检测出的边缘使用**双阈值**以去除假阳性\n5. 分析边缘之间的连接性，保留真正的边缘，消除不明显的边缘\n\n`cv2.Canny()` 函数用于实现 Canny 边缘检测\n\n## 关联笔记\n- [[003-轮廓检测]]\n- [[03-图像处理/003-图像滤波与去噪]]\n- [[05-特征与匹配/001-特征检测]]","html":"<h1>边缘检测</h1>\n\n<h2>Laplacian（拉普拉斯）边缘检测</h2>\n<ul>\n<li>使用图像矩阵与拉普拉斯核进行卷积运算</li>\n<li>本质：计算图像中任意一点与其在水平方向和垂直方向上 4 个相邻点平均值的差值</li>\n<li><strong>二阶导数算子</strong></li>\n<li><code>cv2.Laplacian()</code> 函数</li>\n\n</ul>\n<h2>Sobel 边缘检测</h2>\n<ul>\n<li>将<strong>高斯滤波和微分</strong>结合起来执行图像卷积运算</li>\n<li>具有一定的抗噪性</li>\n<li><strong>一阶导数算子</strong>（包括 Roberts、Prewitt、Sobel）</li>\n<li><code>cv2.Sobel()</code> 函数</li>\n\n</ul>\n<h2>Canny 边缘检测</h2>\n<p>Laplacian 和 Sobel 算法简单，但结果可能损失过多边缘信息或有很多噪声。<strong>Canny 算法更复杂</strong>，包含 5 个步骤：</p>\n\n<p>1. 使用<strong>高斯滤波</strong>去除图像噪声</p>\n<p>2. 使用 <strong>Sobel 核</strong>进行滤波，计算梯度</p>\n<p>3. 在边缘使用<strong>非最大值抑制</strong>（Non-maximum Suppression）</p>\n<p>4. 对检测出的边缘使用<strong>双阈值</strong>以去除假阳性</p>\n<p>5. 分析边缘之间的连接性，保留真正的边缘，消除不明显的边缘</p>\n\n<p><code>cv2.Canny()</code> 函数用于实现 Canny 边缘检测</p>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#003-%E8%BD%AE%E5%BB%93%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">003-轮廓检测</a></li>\n<li><a href=\"#03-%E5%9B%BE%E5%83%8F%E5%A4%84%E7%90%86%2F003-%E5%9B%BE%E5%83%8F%E6%BB%A4%E6%B3%A2%E4%B8%8E%E5%8E%BB%E5%99%AA\" class=\"wiki-link\">003-图像滤波与去噪</a></li>\n<li><a href=\"#05-%E7%89%B9%E5%BE%81%E4%B8%8E%E5%8C%B9%E9%85%8D%2F001-%E7%89%B9%E5%BE%81%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">001-特征检测</a></li>\n</ul>\n"},{"rel":"04-图像分析/003-轮廓检测.md","title":"轮廓检测","tags":["OpenCV","轮廓","findContours","形状分析"],"category":"计算机视觉/图像分析","summary":"从二值图像中查找、绘制轮廓，获取轮廓的各种几何特征","body":"# 轮廓检测\n\n## 查找与绘制轮廓\n- **`cv2.findContours()`** 函数用于从二值图像中查找图像轮廓\n- 返回的轮廓层次格式：`[下一个轮廓, 前一个轮廓, 第一个子级轮廓, 父级轮廓]`\n- **`cv2.drawContours()`** 函数用于绘制轮廓\n\n## 轮廓特征\n| 函数 | 返回内容 |\n|------|----------|\n| `cv2.moments()` | 轮廓的矩（面积、位置、角度、形状等几何特征） |\n| `cv2.contourArea()` | 轮廓面积 |\n| `cv2.arcLength()` | 轮廓的长度 |\n| `cv2.approxPolyDP()` | 轮廓的近似多边形 |\n| `cv2.convexHull()` | 轮廓的凸包 |\n\n## 轮廓边界形状\n| 函数 | 说明 |\n|------|------|\n| `cv2.boundingRect()` | 轮廓的**直边界矩形**（两条边水平，不一定是面积最小） |\n| `cv2.minAreaRect()` | 轮廓的**旋转矩形**（容纳轮廓的面积最小的矩形） |\n| `cv2.minEnclosingCircle()` | 容纳轮廓的**最小外包圆** |\n| `cv2.fitEllipse()` | 轮廓的**拟合椭圆** |\n| `cv2.fitLine()` | 轮廓的**拟合直线** |\n| `cv2.minEnclosingTriangle()` | 容纳轮廓的**最小外包三角形** |\n\n## 关联笔记\n- [[002-边缘检测]]\n- [[004-霍夫变换]]","html":"<h1>轮廓检测</h1>\n\n<h2>查找与绘制轮廓</h2>\n<ul>\n<li><strong><code>cv2.findContours()</code></strong> 函数用于从二值图像中查找图像轮廓</li>\n<li>返回的轮廓层次格式：<code>[下一个轮廓, 前一个轮廓, 第一个子级轮廓, 父级轮廓]</code></li>\n<li><strong><code>cv2.drawContours()</code></strong> 函数用于绘制轮廓</li>\n\n</ul>\n<h2>轮廓特征</h2>\n<table>\n<tr><td>函数</td><td>返回内容</td></tr>\n<tr><td><code>cv2.moments()</code></td><td>轮廓的矩（面积、位置、角度、形状等几何特征）</td></tr>\n<tr><td><code>cv2.contourArea()</code></td><td>轮廓面积</td></tr>\n<tr><td><code>cv2.arcLength()</code></td><td>轮廓的长度</td></tr>\n<tr><td><code>cv2.approxPolyDP()</code></td><td>轮廓的近似多边形</td></tr>\n<tr><td><code>cv2.convexHull()</code></td><td>轮廓的凸包</td></tr>\n</table>\n\n<h2>轮廓边界形状</h2>\n<table>\n<tr><td>函数</td><td>说明</td></tr>\n<tr><td><code>cv2.boundingRect()</code></td><td>轮廓的<strong>直边界矩形</strong>（两条边水平，不一定是面积最小）</td></tr>\n<tr><td><code>cv2.minAreaRect()</code></td><td>轮廓的<strong>旋转矩形</strong>（容纳轮廓的面积最小的矩形）</td></tr>\n<tr><td><code>cv2.minEnclosingCircle()</code></td><td>容纳轮廓的<strong>最小外包圆</strong></td></tr>\n<tr><td><code>cv2.fitEllipse()</code></td><td>轮廓的<strong>拟合椭圆</strong></td></tr>\n<tr><td><code>cv2.fitLine()</code></td><td>轮廓的<strong>拟合直线</strong></td></tr>\n<tr><td><code>cv2.minEnclosingTriangle()</code></td><td>容纳轮廓的<strong>最小外包三角形</strong></td></tr>\n</table>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#002-%E8%BE%B9%E7%BC%98%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">002-边缘检测</a></li>\n<li><a href=\"#004-%E9%9C%8D%E5%A4%AB%E5%8F%98%E6%8D%A2\" class=\"wiki-link\">004-霍夫变换</a></li>\n</ul>\n"},{"rel":"04-图像分析/004-霍夫变换.md","title":"霍夫变换","tags":["OpenCV","霍夫变换","直线检测","圆检测"],"category":"计算机视觉/图像分析","summary":"利用霍夫变换检测图像中的直线和圆","body":"# 霍夫变换\n\n## 直线检测\n- **`cv2.HoughLines()`** 函数利用**霍夫变换算法**检测图像中的直线\n- **`cv2.HoughLinesP()`** 函数利用**概率霍夫变换算法**检测图像中的直线（更推荐，效率更高）\n\n## 圆检测\n- **`cv2.HoughCircles()`** 函数利用霍夫变换查找图像中的圆\n\n## 关联笔记\n- [[003-轮廓检测]]\n- [[002-边缘检测]]","html":"<h1>霍夫变换</h1>\n\n<h2>直线检测</h2>\n<ul>\n<li><strong><code>cv2.HoughLines()</code></strong> 函数利用<strong>霍夫变换算法</strong>检测图像中的直线</li>\n<li><strong><code>cv2.HoughLinesP()</code></strong> 函数利用<strong>概率霍夫变换算法</strong>检测图像中的直线（更推荐，效率更高）</li>\n\n</ul>\n<h2>圆检测</h2>\n<ul>\n<li><strong><code>cv2.HoughCircles()</code></strong> 函数利用霍夫变换查找图像中的圆</li>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#003-%E8%BD%AE%E5%BB%93%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">003-轮廓检测</a></li>\n<li><a href=\"#002-%E8%BE%B9%E7%BC%98%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">002-边缘检测</a></li>\n</ul>\n"},{"rel":"04-图像分析/005-图像分割.md","title":"图像分割","tags":["OpenCV","图像分割","分水岭","图像金字塔","GrabCut"],"category":"计算机视觉/图像分析","summary":"模板匹配、分水岭算法、图像金字塔和GrabCut交互式前景提取","body":"# 图像分割\n\n## 分水岭算法\n- 基本原理：将灰度图像视为地形图表面，灰度值高的部分表示山峰，低的部分表示山谷\n- 用不同颜色的水（标签）填充每个独立的山谷（局部最小值）\n- 水平面上升，不同颜色的水将合并 → 在汇合位置建造水坝\n- 持续填充直到所有山峰都在水下 → 水坝作为图像分割的依据\n\n### 操作步骤\n1. 将原图像转换为灰度图像\n2. 应用开运算和膨胀操作，去除噪声，确定背景\n3. 进行距离转换，再进行阈值处理，确定前景\n4. 确定未知区域（背景 - 前景）\n5. 标记背景图像\n6. 执行分水岭算法\n\n### 关键函数\n| 函数 | 说明 |\n|------|------|\n| `cv2.distanceTransform()` | 计算非 0 值像素到 0 值（背景）像素的距离 |\n| `cv2.connectedComponents()` | 将背景标记为 0，其他标记为从 1 开始的整数 |\n| `cv2.subtract()` | 图像相减（img1, img2 尺寸必须一致） |\n| `cv2.watershed()` | 执行分水岭算法分割图像 |\n\n## 图像金字塔\n从分辨率的角度分析处理图像，底部为原始图像，对原始图像梯次向下采样：\n- 层次越高，分辨率越低，图像越小\n- 每向上一层，图像的宽、高为下一层的一半\n\n### 高斯金字塔\n- **向下采样**：`cv2.pyrDown()`\n- **向上采样**：`cv2.pyrUp()`\n\n### 拉普拉斯金字塔\n- 第 n 层 = 该层高斯金字塔图像 − 第 n+1 层向上采样结果\n\n## 交互式前景提取（GrabCut）\n1. 用一个矩形指定要提取的前景的大致范围\n2. 执行前景提取算法，得到初步结果\n3. 人工干预：复制原图像作为掩模，用白色标注前景，黑色标注背景（不需要精确）\n4. 使用掩模图像再次执行前景提取\n- `cv2.grabCut()` 函数用于实现前景提取\n\n## 关联笔记\n- [[03-图像处理/005-形态学操作]]\n- [[05-特征与匹配/003-模板匹配]]","html":"<h1>图像分割</h1>\n\n<h2>分水岭算法</h2>\n<ul>\n<li>基本原理：将灰度图像视为地形图表面，灰度值高的部分表示山峰，低的部分表示山谷</li>\n<li>用不同颜色的水（标签）填充每个独立的山谷（局部最小值）</li>\n<li>水平面上升，不同颜色的水将合并 → 在汇合位置建造水坝</li>\n<li>持续填充直到所有山峰都在水下 → 水坝作为图像分割的依据</li>\n\n</ul>\n<h3>操作步骤</h3>\n<p>1. 将原图像转换为灰度图像</p>\n<p>2. 应用开运算和膨胀操作，去除噪声，确定背景</p>\n<p>3. 进行距离转换，再进行阈值处理，确定前景</p>\n<p>4. 确定未知区域（背景 - 前景）</p>\n<p>5. 标记背景图像</p>\n<p>6. 执行分水岭算法</p>\n\n<h3>关键函数</h3>\n<table>\n<tr><td>函数</td><td>说明</td></tr>\n<tr><td><code>cv2.distanceTransform()</code></td><td>计算非 0 值像素到 0 值（背景）像素的距离</td></tr>\n<tr><td><code>cv2.connectedComponents()</code></td><td>将背景标记为 0，其他标记为从 1 开始的整数</td></tr>\n<tr><td><code>cv2.subtract()</code></td><td>图像相减（img1, img2 尺寸必须一致）</td></tr>\n<tr><td><code>cv2.watershed()</code></td><td>执行分水岭算法分割图像</td></tr>\n</table>\n\n<h2>图像金字塔</h2>\n<p>从分辨率的角度分析处理图像，底部为原始图像，对原始图像梯次向下采样：</p>\n<ul>\n<li>层次越高，分辨率越低，图像越小</li>\n<li>每向上一层，图像的宽、高为下一层的一半</li>\n\n</ul>\n<h3>高斯金字塔</h3>\n<ul>\n<li><strong>向下采样</strong>：<code>cv2.pyrDown()</code></li>\n<li><strong>向上采样</strong>：<code>cv2.pyrUp()</code></li>\n\n</ul>\n<h3>拉普拉斯金字塔</h3>\n<ul>\n<li>第 n 层 = 该层高斯金字塔图像 − 第 n+1 层向上采样结果</li>\n\n</ul>\n<h2>交互式前景提取（GrabCut）</h2>\n<p>1. 用一个矩形指定要提取的前景的大致范围</p>\n<p>2. 执行前景提取算法，得到初步结果</p>\n<p>3. 人工干预：复制原图像作为掩模，用白色标注前景，黑色标注背景（不需要精确）</p>\n<p>4. 使用掩模图像再次执行前景提取</p>\n<ul>\n<li><code>cv2.grabCut()</code> 函数用于实现前景提取</li>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#03-%E5%9B%BE%E5%83%8F%E5%A4%84%E7%90%86%2F005-%E5%BD%A2%E6%80%81%E5%AD%A6%E6%93%8D%E4%BD%9C\" class=\"wiki-link\">005-形态学操作</a></li>\n<li><a href=\"#05-%E7%89%B9%E5%BE%81%E4%B8%8E%E5%8C%B9%E9%85%8D%2F003-%E6%A8%A1%E6%9D%BF%E5%8C%B9%E9%85%8D\" class=\"wiki-link\">003-模板匹配</a></li>\n</ul>\n"},{"rel":"05-特征与匹配/001-特征检测.md","title":"特征检测","tags":["OpenCV","特征检测","Harris","SIFT","ORB","FAST"],"category":"计算机视觉/特征与匹配","summary":"Harris角检测、Shi-Tomasi、FAST、SIFT和ORB特征检测方法的原理与使用","body":"# 特征检测\n\n特征是指图像中具有独特性和易于识别性的区域，角、边缘等都属于有意义的特征。\n\n## Harris 角检测\n- 角是两条边的交点，是图像中各个方向上强度变化最大的区域\n- 由 Chris Harris 和 Mike Stephens 提出\n- `cv2.cornerHarris()` 函数\n- `cv2.cornerSubPix()` 函数用于对 Harris 角进行优化，找出更精确的位置\n\n## Shi-Tomasi 角检测\n- 在 Harris 角检测基础上提出的改进方法\n- `cv2.goodFeaturesToTrack()` 函数查找图像中的 N 个最强角\n\n## FAST 特征检测器\n- 主要根据像素周围 **16 个像素**的强度和阈值等参数来判断像素是否为关键点\n- `cv2.FastFeatureDetector_create()` 创建 FAST 对象\n- 调用 `detect()` 方法执行检测\n\n## SIFT（尺度不变特征变换）\n- 用于查找图像中的**尺度不变特征**\n- 图像中的角具有旋转不变特征，但在缩放时可能变化\n- SIFT 解决了尺度变化的问题\n- `cv2.SIFT_create()` 函数创建 SIFT 对象\n\n## ORB 特征检测\n- 以 **FAST 特征检测器 + BRIEF 描述符**为基础进行了改进\n- `cv2.ORB_create()` 函数创建 ORB 对象\n\n## 关联笔记\n- [[002-特征匹配]]\n- [[04-图像分析/002-边缘检测]]\n- [[003-模板匹配]]","html":"<h1>特征检测</h1>\n\n<p>特征是指图像中具有独特性和易于识别性的区域，角、边缘等都属于有意义的特征。</p>\n\n<h2>Harris 角检测</h2>\n<ul>\n<li>角是两条边的交点，是图像中各个方向上强度变化最大的区域</li>\n<li>由 Chris Harris 和 Mike Stephens 提出</li>\n<li><code>cv2.cornerHarris()</code> 函数</li>\n<li><code>cv2.cornerSubPix()</code> 函数用于对 Harris 角进行优化，找出更精确的位置</li>\n\n</ul>\n<h2>Shi-Tomasi 角检测</h2>\n<ul>\n<li>在 Harris 角检测基础上提出的改进方法</li>\n<li><code>cv2.goodFeaturesToTrack()</code> 函数查找图像中的 N 个最强角</li>\n\n</ul>\n<h2>FAST 特征检测器</h2>\n<ul>\n<li>主要根据像素周围 <strong>16 个像素</strong>的强度和阈值等参数来判断像素是否为关键点</li>\n<li><code>cv2.FastFeatureDetector_create()</code> 创建 FAST 对象</li>\n<li>调用 <code>detect()</code> 方法执行检测</li>\n\n</ul>\n<h2>SIFT（尺度不变特征变换）</h2>\n<ul>\n<li>用于查找图像中的<strong>尺度不变特征</strong></li>\n<li>图像中的角具有旋转不变特征，但在缩放时可能变化</li>\n<li>SIFT 解决了尺度变化的问题</li>\n<li><code>cv2.SIFT_create()</code> 函数创建 SIFT 对象</li>\n\n</ul>\n<h2>ORB 特征检测</h2>\n<ul>\n<li>以 <strong>FAST 特征检测器 + BRIEF 描述符</strong>为基础进行了改进</li>\n<li><code>cv2.ORB_create()</code> 函数创建 ORB 对象</li>\n\n</ul>\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#002-%E7%89%B9%E5%BE%81%E5%8C%B9%E9%85%8D\" class=\"wiki-link\">002-特征匹配</a></li>\n<li><a href=\"#04-%E5%9B%BE%E5%83%8F%E5%88%86%E6%9E%90%2F002-%E8%BE%B9%E7%BC%98%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">002-边缘检测</a></li>\n<li><a href=\"#003-%E6%A8%A1%E6%9D%BF%E5%8C%B9%E9%85%8D\" class=\"wiki-link\">003-模板匹配</a></li>\n</ul>\n"},{"rel":"05-特征与匹配/002-特征匹配.md","title":"特征匹配","tags":["OpenCV","特征匹配","BFMatcher","FLANN","描述符"],"category":"计算机视觉/特征与匹配","summary":"暴力匹配器和FLANN特征匹配，以及基于匹配结果的对象定位","body":"# 特征匹配\n\n获得图像的关键点后，通过计算得到关键点的**描述符**，然后进行特征匹配。\n\n## 关键术语\n- **训练图像**（Train Image）：图 A，要搜索的目标图像\n- **查询图像**（Query Image）：图 B，要查找的特征\n- **训练描述符**：图 A 的关键点描述符\n- **查询描述符**：图 B 的关键点描述符\n\n## 暴力匹配器（BFMatcher）\n- 在查询描述符中取一个关键点的描述符，与训练描述符中的所有关键点描述符比较\n- 每次比较给出一个距离值，**距离最小**的值对应最佳匹配结果\n- `cv2.BFMatcher_create()` 函数创建暴力匹配器\n- `match()` 方法：返回每个关键点的最佳匹配结果\n- `knnMatch()` 方法：返回指定数量的最佳匹配结果\n\n## FLANN 匹配器\n- **Fast Library for Approximate Nearest Neighbors**\n- 比其他的最近邻算法更快\n- 需要传递两个字典参数：\n\n### index_params（索引树参数）\n- SIFT/SURF 算法：`algorithm = FLANN_INDEX_KDTREE (1), trees = 5`\n- ORB 算法：`algorithm = FLANN_INDEX_LSH (6), table_number = 6, key_size = 12, multi_probe_level = 1`\n\n### search_params（搜索参数）\n- `checks = 50`（遍历次数越多，匹配越精确）\n\n## 对象定位\n经过特征匹配后，可找到查询图像在训练图像中的最佳匹配：\n1. `cv2.findHomography()`：执行查询图像和训练图像的**透视转换**\n2. `cv2.perspectiveTransform()`：执行向量的透视矩阵转换，获得查询图像在训练图像中的位置\n\n## 关联笔记\n- [[001-特征检测]]\n- [[003-模板匹配]]","html":"<h1>特征匹配</h1>\n\n<p>获得图像的关键点后，通过计算得到关键点的<strong>描述符</strong>，然后进行特征匹配。</p>\n\n<h2>关键术语</h2>\n<ul>\n<li><strong>训练图像</strong>（Train Image）：图 A，要搜索的目标图像</li>\n<li><strong>查询图像</strong>（Query Image）：图 B，要查找的特征</li>\n<li><strong>训练描述符</strong>：图 A 的关键点描述符</li>\n<li><strong>查询描述符</strong>：图 B 的关键点描述符</li>\n\n</ul>\n<h2>暴力匹配器（BFMatcher）</h2>\n<ul>\n<li>在查询描述符中取一个关键点的描述符，与训练描述符中的所有关键点描述符比较</li>\n<li>每次比较给出一个距离值，<strong>距离最小</strong>的值对应最佳匹配结果</li>\n<li><code>cv2.BFMatcher_create()</code> 函数创建暴力匹配器</li>\n<li><code>match()</code> 方法：返回每个关键点的最佳匹配结果</li>\n<li><code>knnMatch()</code> 方法：返回指定数量的最佳匹配结果</li>\n\n</ul>\n<h2>FLANN 匹配器</h2>\n<ul>\n<li><strong>Fast Library for Approximate Nearest Neighbors</strong></li>\n<li>比其他的最近邻算法更快</li>\n<li>需要传递两个字典参数：</li>\n\n</ul>\n<h3>index_params（索引树参数）</h3>\n<ul>\n<li>SIFT/SURF 算法：<code>algorithm = FLANN_INDEX_KDTREE (1), trees = 5</code></li>\n<li>ORB 算法：<code>algorithm = FLANN_INDEX_LSH (6), table_number = 6, key_size = 12, multi_probe_level = 1</code></li>\n\n</ul>\n<h3>search_params（搜索参数）</h3>\n<ul>\n<li><code>checks = 50</code>（遍历次数越多，匹配越精确）</li>\n\n</ul>\n<h2>对象定位</h2>\n<p>经过特征匹配后，可找到查询图像在训练图像中的最佳匹配：</p>\n<p>1. <code>cv2.findHomography()</code>：执行查询图像和训练图像的<strong>透视转换</strong></p>\n<p>2. <code>cv2.perspectiveTransform()</code>：执行向量的透视矩阵转换，获得查询图像在训练图像中的位置</p>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#001-%E7%89%B9%E5%BE%81%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">001-特征检测</a></li>\n<li><a href=\"#003-%E6%A8%A1%E6%9D%BF%E5%8C%B9%E9%85%8D\" class=\"wiki-link\">003-模板匹配</a></li>\n</ul>\n"},{"rel":"05-特征与匹配/003-模板匹配.md","title":"模板匹配","tags":["OpenCV","模板匹配","模式识别"],"category":"计算机视觉/特征与匹配","summary":"在图像中查找与目标图像最相近部分，支持单目标和多目标匹配","body":"# 模板匹配\n\n模板匹配是指在当前图像（待匹配图像 `I`）中查找与目标图像（模板图像 `T`）最相近的部分。\n\n## 结果矩阵\n- `cv2.matchTemplate()` 函数执行匹配操作，返回结果矩阵 `result`\n- 假设 `I` 宽高为 `(W,H)`，`T` 宽高为 `(w,h)`\n- `result` 的大小 = `(W-w+1, H-h+1)`\n\n## 匹配方法\n| 方法 | 说明 |\n|------|------|\n| **方差匹配方法** | 匹配度越高，值越接近 0 |\n| **归一化方差匹配** | 完全匹配 = 0 |\n| **相关性匹配** | 完全匹配 → 很大值，不匹配 → 很小值或 0 |\n| **归一化互相关匹配** | 完全匹配 → 1，完全不匹配 → 0 |\n| **相关系数匹配** | 完全匹配 → 很大值，完全不匹配 → 0，完全负相关 → 很大负数 |\n| **归一化相关系数匹配** | 完全匹配 → 1，完全负相关 → -1，完全不匹配 → 0 |\n\n## 单目标匹配\n输入图像中只存在一个可能匹配结果。\n\n## 多目标匹配\n输入图像中存在多个可能的匹配结果，根据匹配方法设置**阈值**筛选结果。\n\n## 关联笔记\n- [[001-特征检测]]\n- [[002-特征匹配]]","html":"<h1>模板匹配</h1>\n\n<p>模板匹配是指在当前图像（待匹配图像 <code>I</code>）中查找与目标图像（模板图像 <code>T</code>）最相近的部分。</p>\n\n<h2>结果矩阵</h2>\n<ul>\n<li><code>cv2.matchTemplate()</code> 函数执行匹配操作，返回结果矩阵 <code>result</code></li>\n<li>假设 <code>I</code> 宽高为 <code>(W,H)</code>，<code>T</code> 宽高为 <code>(w,h)</code></li>\n<li><code>result</code> 的大小 = <code>(W-w+1, H-h+1)</code></li>\n\n</ul>\n<h2>匹配方法</h2>\n<table>\n<tr><td>方法</td><td>说明</td></tr>\n<tr><td><strong>方差匹配方法</strong></td><td>匹配度越高，值越接近 0</td></tr>\n<tr><td><strong>归一化方差匹配</strong></td><td>完全匹配 = 0</td></tr>\n<tr><td><strong>相关性匹配</strong></td><td>完全匹配 → 很大值，不匹配 → 很小值或 0</td></tr>\n<tr><td><strong>归一化互相关匹配</strong></td><td>完全匹配 → 1，完全不匹配 → 0</td></tr>\n<tr><td><strong>相关系数匹配</strong></td><td>完全匹配 → 很大值，完全不匹配 → 0，完全负相关 → 很大负数</td></tr>\n<tr><td><strong>归一化相关系数匹配</strong></td><td>完全匹配 → 1，完全负相关 → -1，完全不匹配 → 0</td></tr>\n</table>\n\n<h2>单目标匹配</h2>\n<p>输入图像中只存在一个可能匹配结果。</p>\n\n<h2>多目标匹配</h2>\n<p>输入图像中存在多个可能的匹配结果，根据匹配方法设置<strong>阈值</strong>筛选结果。</p>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#001-%E7%89%B9%E5%BE%81%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">001-特征检测</a></li>\n<li><a href=\"#002-%E7%89%B9%E5%BE%81%E5%8C%B9%E9%85%8D\" class=\"wiki-link\">002-特征匹配</a></li>\n</ul>\n"},{"rel":"06-目标检测与识别/001-人脸检测.md","title":"人脸检测","tags":["OpenCV","人脸检测","Haar级联","DNN","目标检测"],"category":"计算机视觉/目标检测与识别","summary":"使用Haar级联分类器和深度学习DNN模型进行人脸检测","body":"# 人脸检测\n\n人脸检测是指在图像中完成人脸定位的过程。\n\n## Haar 级联分类器\n- `cv2.CascadeClassifier()` 函数用于加载分类器\n- `detectMultiScale()` 方法用于执行检测\n\n## 深度神经网络（DNN）检测\nOpenCV 的 DNN 模块提供了基于深度学习的人脸检测器，支持 Caffe、TensorFlow、Torch、Darknet 等框架。\n\n### 预训练模型\nOpenCV 提供两个预训练的人脸检测模型：**Caffe** 和 **TensorFlow**。\n\n### 使用步骤\n1. 调用 `cv2.dnn.readNetFromCaffe()` 或 `cv2.dnn.readNetFromTensorflow()` 加载模型\n2. 调用 `cv2.dnn.blobFromImage()` 将图像转换为图像块数据\n3. 调用 `setInput()` 方法设置输入数据\n4. 调用 `forward()` 方法执行计算，获得预测结果\n5. 将可信度高于指定值的结果作为检测结果，标注人脸\n\n## 关联笔记\n- [[002-人脸识别]]\n- [[07-机器学习与深度学习/002-深度学习与DNN]]\n- [[001-特征检测]]","html":"<h1>人脸检测</h1>\n\n<p>人脸检测是指在图像中完成人脸定位的过程。</p>\n\n<h2>Haar 级联分类器</h2>\n<ul>\n<li><code>cv2.CascadeClassifier()</code> 函数用于加载分类器</li>\n<li><code>detectMultiScale()</code> 方法用于执行检测</li>\n\n</ul>\n<h2>深度神经网络（DNN）检测</h2>\n<p>OpenCV 的 DNN 模块提供了基于深度学习的人脸检测器，支持 Caffe、TensorFlow、Torch、Darknet 等框架。</p>\n\n<h3>预训练模型</h3>\n<p>OpenCV 提供两个预训练的人脸检测模型：<strong>Caffe</strong> 和 <strong>TensorFlow</strong>。</p>\n\n<h3>使用步骤</h3>\n<p>1. 调用 <code>cv2.dnn.readNetFromCaffe()</code> 或 <code>cv2.dnn.readNetFromTensorflow()</code> 加载模型</p>\n<p>2. 调用 <code>cv2.dnn.blobFromImage()</code> 将图像转换为图像块数据</p>\n<p>3. 调用 <code>setInput()</code> 方法设置输入数据</p>\n<p>4. 调用 <code>forward()</code> 方法执行计算，获得预测结果</p>\n<p>5. 将可信度高于指定值的结果作为检测结果，标注人脸</p>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#002-%E4%BA%BA%E8%84%B8%E8%AF%86%E5%88%AB\" class=\"wiki-link\">002-人脸识别</a></li>\n<li><a href=\"#07-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E4%B8%8E%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0%2F002-%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0%E4%B8%8EDNN\" class=\"wiki-link\">002-深度学习与DNN</a></li>\n<li><a href=\"#001-%E7%89%B9%E5%BE%81%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">001-特征检测</a></li>\n</ul>\n"},{"rel":"06-目标检测与识别/002-人脸识别.md","title":"人脸识别","tags":["OpenCV","人脸识别","EigenFaces","FisherFaces","LBPH"],"category":"计算机视觉/目标检测与识别","summary":"三种经典人脸识别方法：EigenFaces、FisherFaces和LBPH","body":"# 人脸识别\n\n人脸识别是在人脸检测的基础上进一步判断人的身份。\n\n## EigenFaces\n- 使用**主成分分析（PCA）** 方法将人脸数据从高维处理成低维\n- 获得人脸数据的主要成分信息，完成人脸识别\n\n### 步骤\n1. `cv2.face.EigenFaceRecognizer_create()` 创建识别器\n2. `train()` 方法用已知图像训练模型\n3. `predict()` 方法用未知图像进行识别\n\n## FisherFaces\n- 使用**线性判别分析（LDA）** 方法实现人脸识别\n\n### 步骤\n1. `cv2.face.FisherFaceRecognizer_create()` 创建识别器\n2. `train()` 方法用已知图像训练模型\n3. `predict()` 方法用未知图像进行识别\n\n## LBPH（局部二值模式直方图）\n- 取像素 x 周围（邻域）的 8 个像素与其比较\n- 像素值比 x 大的取 0，否则取 1\n- 将 8 个像素对应的 0、1 连接得到 8 位二进制数，转换为十进制数作为 x 的 LBP 值\n- 对所有像素处理得到 LBP 图像，其直方图就是图像的 LBPH\n\n### 步骤\n1. `cv2.face.LBPHFaceRecognizer_create()` 创建识别器\n2. `train()` 方法训练模型\n3. `predict()` 方法进行识别\n\n## 关联笔记\n- [[001-人脸检测]]\n- [[07-机器学习与深度学习/001-机器学习基础]]","html":"<h1>人脸识别</h1>\n\n<p>人脸识别是在人脸检测的基础上进一步判断人的身份。</p>\n\n<h2>EigenFaces</h2>\n<ul>\n<li>使用<strong>主成分分析（PCA）</strong> 方法将人脸数据从高维处理成低维</li>\n<li>获得人脸数据的主要成分信息，完成人脸识别</li>\n\n</ul>\n<h3>步骤</h3>\n<p>1. <code>cv2.face.EigenFaceRecognizer_create()</code> 创建识别器</p>\n<p>2. <code>train()</code> 方法用已知图像训练模型</p>\n<p>3. <code>predict()</code> 方法用未知图像进行识别</p>\n\n<h2>FisherFaces</h2>\n<ul>\n<li>使用<strong>线性判别分析（LDA）</strong> 方法实现人脸识别</li>\n\n</ul>\n<h3>步骤</h3>\n<p>1. <code>cv2.face.FisherFaceRecognizer_create()</code> 创建识别器</p>\n<p>2. <code>train()</code> 方法用已知图像训练模型</p>\n<p>3. <code>predict()</code> 方法用未知图像进行识别</p>\n\n<h2>LBPH（局部二值模式直方图）</h2>\n<ul>\n<li>取像素 x 周围（邻域）的 8 个像素与其比较</li>\n<li>像素值比 x 大的取 0，否则取 1</li>\n<li>将 8 个像素对应的 0、1 连接得到 8 位二进制数，转换为十进制数作为 x 的 LBP 值</li>\n<li>对所有像素处理得到 LBP 图像，其直方图就是图像的 LBPH</li>\n\n</ul>\n<h3>步骤</h3>\n<p>1. <code>cv2.face.LBPHFaceRecognizer_create()</code> 创建识别器</p>\n<p>2. <code>train()</code> 方法训练模型</p>\n<p>3. <code>predict()</code> 方法进行识别</p>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#001-%E4%BA%BA%E8%84%B8%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">001-人脸检测</a></li>\n<li><a href=\"#07-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E4%B8%8E%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0%2F001-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E5%9F%BA%E7%A1%80\" class=\"wiki-link\">001-机器学习基础</a></li>\n</ul>\n"},{"rel":"06-目标检测与识别/003-图像分类与检索.md","title":"图像分类与检索","tags":["计算机视觉","图像分类","图像检索","特征提取"],"category":"计算机视觉/目标检测与识别","summary":"图像分类的基本概念与图像检索的原理","body":"# 图像分类与检索\n\n## 图像分类\n- 根据图像的内容特征将其归入预先定义的类别\n- 基于手工特征（颜色直方图、纹理、SIFT）的传统方法\n- 基于深度学习（CNN）的方法\n\n## 图像检索\n- 以图搜图，从数据库中找出与查询图像相似的图像\n- 关键步骤：\n  1. 提取图像的特征向量（颜色、纹理、形状等）\n  2. 计算特征相似度（欧氏距离、余弦相似度等）\n  3. 返回最相似的结果\n\n## 特征类型\n| 特征类型 | 说明 |\n|----------|------|\n| **颜色特征** | 颜色直方图、颜色矩、颜色相关图 |\n| **纹理特征** | LBP、GLCM（灰度共生矩阵）、Gabor 滤波 |\n| **形状特征** | 轮廓、Hu 矩、形状上下文 |\n| **空间关系特征** | 图像分割后的区域关系 |\n\n## 关联笔记\n- [[001-特征检测]]\n- [[07-机器学习与深度学习/001-机器学习基础]]\n- [[07-机器学习与深度学习/003-特征提取概述]]","html":"<h1>图像分类与检索</h1>\n\n<h2>图像分类</h2>\n<ul>\n<li>根据图像的内容特征将其归入预先定义的类别</li>\n<li>基于手工特征（颜色直方图、纹理、SIFT）的传统方法</li>\n<li>基于深度学习（CNN）的方法</li>\n\n</ul>\n<h2>图像检索</h2>\n<ul>\n<li>以图搜图，从数据库中找出与查询图像相似的图像</li>\n<li>关键步骤：</li>\n<p>  1. 提取图像的特征向量（颜色、纹理、形状等）</p>\n<p>  2. 计算特征相似度（欧氏距离、余弦相似度等）</p>\n<p>  3. 返回最相似的结果</p>\n\n</ul>\n<h2>特征类型</h2>\n<table>\n<tr><td>特征类型</td><td>说明</td></tr>\n<tr><td><strong>颜色特征</strong></td><td>颜色直方图、颜色矩、颜色相关图</td></tr>\n<tr><td><strong>纹理特征</strong></td><td>LBP、GLCM（灰度共生矩阵）、Gabor 滤波</td></tr>\n<tr><td><strong>形状特征</strong></td><td>轮廓、Hu 矩、形状上下文</td></tr>\n<tr><td><strong>空间关系特征</strong></td><td>图像分割后的区域关系</td></tr>\n</table>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#001-%E7%89%B9%E5%BE%81%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">001-特征检测</a></li>\n<li><a href=\"#07-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E4%B8%8E%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0%2F001-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E5%9F%BA%E7%A1%80\" class=\"wiki-link\">001-机器学习基础</a></li>\n<li><a href=\"#07-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E4%B8%8E%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0%2F003-%E7%89%B9%E5%BE%81%E6%8F%90%E5%8F%96%E6%A6%82%E8%BF%B0\" class=\"wiki-link\">003-特征提取概述</a></li>\n</ul>\n"},{"rel":"07-机器学习与深度学习/001-机器学习基础.md","title":"机器学习基础","tags":["OpenCV","机器学习","kNN","SVM","k-means"],"category":"计算机视觉/机器学习与深度学习","summary":"OpenCV机器学习模块中的k最近邻、支持向量机和k均值聚类算法","body":"# 机器学习基础\n\n**机器学习（Machine Learning，ML）** 是人工智能的核心，研究如何让计算机模拟和学习人类的行为。\n\nOpenCV 的机器学习模块（`ml`）实现了与机器学习有关的类和相关函数。\n\n## k 最近邻（kNN）\n- 找出 k 个距离最近的邻居作为目标的同一类别\n- `cv2.ml.KNearest_create()`\n\n## 支持向量机（SVM）\n- 使用一条**决策边界**（直线）将线性可分离的数据分为两组\n- **非线性可分离**数据转换为高维数据后可成为线性可分离数据——这是 SVM 的核心理论\n- SVM 可使用图像的 **HOG（定向梯度直方图）** 作为特征向量来对图像进行分类\n- `cv2.ml.SVM_create()`\n\n## k 均值聚类（k-Means）\n- 根据数据的密集程度寻找相对密集数据的**质心**\n- 根据质心完成数据分类\n- `cv2.kmeans()`\n\n## 传统 ML 流程 vs DL 流程\n| | 传统机器学习 | 深度学习 |\n|--|-------------|----------|\n| 步骤 | 输入 → 特征提取 → 分类 → 输出 | 输入 → 特征提取与分类 → 输出 |\n| 特征 | 人工设计 | 自动学习 |\n| 数据量 | 较少 | 需要大量数据 |\n\n## 关联笔记\n- [[002-深度学习与DNN]]\n- [[03-特征提取概述]]\n- [[06-目标检测与识别/002-人脸识别]]","html":"<h1>机器学习基础</h1>\n\n<p><strong>机器学习（Machine Learning，ML）</strong> 是人工智能的核心，研究如何让计算机模拟和学习人类的行为。</p>\n\n<p>OpenCV 的机器学习模块（<code>ml</code>）实现了与机器学习有关的类和相关函数。</p>\n\n<h2>k 最近邻（kNN）</h2>\n<ul>\n<li>找出 k 个距离最近的邻居作为目标的同一类别</li>\n<li><code>cv2.ml.KNearest_create()</code></li>\n\n</ul>\n<h2>支持向量机（SVM）</h2>\n<ul>\n<li>使用一条<strong>决策边界</strong>（直线）将线性可分离的数据分为两组</li>\n<li><strong>非线性可分离</strong>数据转换为高维数据后可成为线性可分离数据——这是 SVM 的核心理论</li>\n<li>SVM 可使用图像的 <strong>HOG（定向梯度直方图）</strong> 作为特征向量来对图像进行分类</li>\n<li><code>cv2.ml.SVM_create()</code></li>\n\n</ul>\n<h2>k 均值聚类（k-Means）</h2>\n<ul>\n<li>根据数据的密集程度寻找相对密集数据的<strong>质心</strong></li>\n<li>根据质心完成数据分类</li>\n<li><code>cv2.kmeans()</code></li>\n\n</ul>\n<h2>传统 ML 流程 vs DL 流程</h2>\n<table>\n<tr><td></td><td>传统机器学习</td><td>深度学习</td></tr>\n<tr><td>步骤</td><td>输入 → 特征提取 → 分类 → 输出</td><td>输入 → 特征提取与分类 → 输出</td></tr>\n<tr><td>特征</td><td>人工设计</td><td>自动学习</td></tr>\n<tr><td>数据量</td><td>较少</td><td>需要大量数据</td></tr>\n</table>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#002-%E6%B7%B1%E5%BA%A6%E5%AD%A6%E4%B9%A0%E4%B8%8EDNN\" class=\"wiki-link\">002-深度学习与DNN</a></li>\n<li><a href=\"#03-%E7%89%B9%E5%BE%81%E6%8F%90%E5%8F%96%E6%A6%82%E8%BF%B0\" class=\"wiki-link\">03-特征提取概述</a></li>\n<li><a href=\"#06-%E7%9B%AE%E6%A0%87%E6%A3%80%E6%B5%8B%E4%B8%8E%E8%AF%86%E5%88%AB%2F002-%E4%BA%BA%E8%84%B8%E8%AF%86%E5%88%AB\" class=\"wiki-link\">002-人脸识别</a></li>\n</ul>\n"},{"rel":"07-机器学习与深度学习/002-深度学习与DNN.md","title":"深度学习与DNN","tags":["OpenCV","深度学习","DNN","CNN","神经网络"],"category":"计算机视觉/机器学习与深度学习","summary":"OpenCV深度学习模块的架构、支持框架及推理流程","body":"# 深度学习与 DNN\n\n**深度学习（Deep Learning，DL）** 是机器学习中的热门研究方向，主要研究样本数据的内在规律和表示层次，让计算机能够识别文字、图像和声音等数据。\n\n深度学习的\"深度\"体现在神经网络层次规模上（例如 ResNet 多达上百层）。\n\n## OpenCV DNN 模块\nOpenCV 在 3.1 版本引入 DNN 模块，3.3 版本迁移到主库。目前实现**前馈（推理）方法**，只需要导入预训练模型即可实现基于深度学习的图像处理。\n\n### 支持的框架\n- **Caffe**\n- **TensorFlow**\n- **Torch/PyTorch**\n- **ONNX**（开放神经网络交换）\n\n### 推理流程\n1. 加载模型：`cv2.dnn.readNetFromCaffe()` / `cv2.dnn.readNetFromTensorflow()`\n2. 图像预处理：`cv2.dnn.blobFromImage()` 将图像转换为模型输入格式\n3. 设置输入：`net.setInput()`\n4. 前向推理：`net.forward()`\n5. 解析输出结果\n\n## 关联笔记\n- [[001-机器学习基础]]\n- [[06-目标检测与识别/001-人脸检测]]","html":"<h1>深度学习与 DNN</h1>\n\n<p><strong>深度学习（Deep Learning，DL）</strong> 是机器学习中的热门研究方向，主要研究样本数据的内在规律和表示层次，让计算机能够识别文字、图像和声音等数据。</p>\n\n<p>深度学习的&quot;深度&quot;体现在神经网络层次规模上（例如 ResNet 多达上百层）。</p>\n\n<h2>OpenCV DNN 模块</h2>\n<p>OpenCV 在 3.1 版本引入 DNN 模块，3.3 版本迁移到主库。目前实现<strong>前馈（推理）方法</strong>，只需要导入预训练模型即可实现基于深度学习的图像处理。</p>\n\n<h3>支持的框架</h3>\n<ul>\n<li><strong>Caffe</strong></li>\n<li><strong>TensorFlow</strong></li>\n<li><strong>Torch/PyTorch</strong></li>\n<li><strong>ONNX</strong>（开放神经网络交换）</li>\n\n</ul>\n<h3>推理流程</h3>\n<p>1. 加载模型：<code>cv2.dnn.readNetFromCaffe()</code> / <code>cv2.dnn.readNetFromTensorflow()</code></p>\n<p>2. 图像预处理：<code>cv2.dnn.blobFromImage()</code> 将图像转换为模型输入格式</p>\n<p>3. 设置输入：<code>net.setInput()</code></p>\n<p>4. 前向推理：<code>net.forward()</code></p>\n<p>5. 解析输出结果</p>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#001-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E5%9F%BA%E7%A1%80\" class=\"wiki-link\">001-机器学习基础</a></li>\n<li><a href=\"#06-%E7%9B%AE%E6%A0%87%E6%A3%80%E6%B5%8B%E4%B8%8E%E8%AF%86%E5%88%AB%2F001-%E4%BA%BA%E8%84%B8%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">001-人脸检测</a></li>\n</ul>\n"},{"rel":"07-机器学习与深度学习/003-特征提取概述.md","title":"特征提取概述","tags":["计算机视觉","特征提取","颜色特征","纹理特征","形状特征"],"category":"计算机视觉/机器学习与深度学习","summary":"图像特征提取的四大类：颜色、纹理、形状和空间关系特征","body":"# 特征提取概述\n\n特征提取是计算机视觉的核心环节，将图像数据转换为有意义的数值表示。\n\n## 颜色特征\n- **颜色直方图**：统计各颜色出现的频率\n- **颜色矩**：颜色分布的统计矩（均值、方差等）\n- **颜色相关图**：记录颜色对之间的空间关系\n\n## 纹理特征\n- **LBP（局部二值模式）**：描述局部纹理模式\n- **GLCM（灰度共生矩阵）**：统计像素对灰度级的空间关系\n- **Gabor 滤波**：多尺度多方向的纹理分析\n\n## 形状特征\n- **轮廓**：物体边界描述\n- **Hu 矩**：具有平移、旋转、缩放不变性的形状描述子\n- **形状上下文**：描述形状点集的分布\n\n## 空间关系特征\n基于图像分割后的区域关系，描述对象之间的相对位置和拓扑关系。\n\n## 关联笔记\n- [[001-机器学习基础]]\n- [[05-特征与匹配/001-特征检测]]\n- [[06-目标检测与识别/003-图像分类与检索]]","html":"<h1>特征提取概述</h1>\n\n<p>特征提取是计算机视觉的核心环节，将图像数据转换为有意义的数值表示。</p>\n\n<h2>颜色特征</h2>\n<ul>\n<li><strong>颜色直方图</strong>：统计各颜色出现的频率</li>\n<li><strong>颜色矩</strong>：颜色分布的统计矩（均值、方差等）</li>\n<li><strong>颜色相关图</strong>：记录颜色对之间的空间关系</li>\n\n</ul>\n<h2>纹理特征</h2>\n<ul>\n<li><strong>LBP（局部二值模式）</strong>：描述局部纹理模式</li>\n<li><strong>GLCM（灰度共生矩阵）</strong>：统计像素对灰度级的空间关系</li>\n<li><strong>Gabor 滤波</strong>：多尺度多方向的纹理分析</li>\n\n</ul>\n<h2>形状特征</h2>\n<ul>\n<li><strong>轮廓</strong>：物体边界描述</li>\n<li><strong>Hu 矩</strong>：具有平移、旋转、缩放不变性的形状描述子</li>\n<li><strong>形状上下文</strong>：描述形状点集的分布</li>\n\n</ul>\n<h2>空间关系特征</h2>\n<p>基于图像分割后的区域关系，描述对象之间的相对位置和拓扑关系。</p>\n\n<h2>关联笔记</h2>\n<ul>\n<li><a href=\"#001-%E6%9C%BA%E5%99%A8%E5%AD%A6%E4%B9%A0%E5%9F%BA%E7%A1%80\" class=\"wiki-link\">001-机器学习基础</a></li>\n<li><a href=\"#05-%E7%89%B9%E5%BE%81%E4%B8%8E%E5%8C%B9%E9%85%8D%2F001-%E7%89%B9%E5%BE%81%E6%A3%80%E6%B5%8B\" class=\"wiki-link\">001-特征检测</a></li>\n<li><a href=\"#06-%E7%9B%AE%E6%A0%87%E6%A3%80%E6%B5%8B%E4%B8%8E%E8%AF%86%E5%88%AB%2F003-%E5%9B%BE%E5%83%8F%E5%88%86%E7%B1%BB%E4%B8%8E%E6%A3%80%E7%B4%A2\" class=\"wiki-link\">003-图像分类与检索</a></li>\n</ul>\n"}],"tags":{"BFMatcher":["05-特征与匹配/002-特征匹配.md"],"BGR":["03-图像处理/001-色彩空间与通道.md"],"CLAHE":["04-图像分析/001-直方图处理.md"],"CNN":["07-机器学习与深度学习/002-深度学习与DNN.md"],"Canny":["04-图像分析/002-边缘检测.md"],"DNN":["06-目标检测与识别/001-人脸检测.md","07-机器学习与深度学习/002-深度学习与DNN.md"],"EigenFaces":["06-目标检测与识别/002-人脸识别.md"],"FAST":["05-特征与匹配/001-特征检测.md"],"FLANN":["05-特征与匹配/002-特征匹配.md"],"FisherFaces":["06-目标检测与识别/002-人脸识别.md"],"GUI":["02-OpenCV基础/003-GUI交互与绘图.md"],"GrabCut":["04-图像分析/005-图像分割.md"],"HSV":["03-图像处理/001-色彩空间与通道.md"],"Haar级联":["06-目标检测与识别/001-人脸检测.md"],"Harris":["05-特征与匹配/001-特征检测.md"],"LBPH":["06-目标检测与识别/002-人脸识别.md"],"Laplacian":["04-图像分析/002-边缘检测.md"],"MOC":["00-欢迎页.md"],"NumPy":["02-OpenCV基础/001-NumPy数组.md"],"ORB":["05-特征与匹配/001-特征检测.md"],"OpenCV":["01-基础知识/002-OpenCV简介.md","02-OpenCV基础/001-NumPy数组.md","02-OpenCV基础/002-图像读写与显示.md","02-OpenCV基础/003-GUI交互与绘图.md","02-OpenCV基础/004-图像运算.md","03-图像处理/001-色彩空间与通道.md"," // ===== STATE =====
var currentNote = null;
var currentTag = null;

// ===== RENDER =====
function showWelcome() {
  currentNote = null;
  currentTag = null;
  var welcome = DATA.notes.find(n => n.rel === "00-欢迎页.md");
  if (welcome) {
    renderNote(welcome);
    updateSidebar(null);
    updateBreadcrumb([]);
  } else {
    // Fallback: show first note
    showNote(DATA.notes[0].rel);
  }
  document.getElementById("sidebar-search").value = "";
  filterNotes("");
}

function showNote(rel) {
  var note = DATA.notes.find(n => n.rel === rel);
  if (!note) return;
  currentNote = note;
  currentTag = null;
  renderNote(note);
  updateSidebar(rel);
  updateBreadcrumb(note.category.split("/"));
  closeSidebar();
}

function filterByTag(tag) {
  currentTag = tag;
  currentNote = null;
  var filtered = DATA.notes.filter(n => n.tags.includes(tag) && !n.rel.startsWith("00-"));
  renderList("标签: " + tag, filtered);
  updateSidebar(null);
  updateBreadcrumb([]);
  // Highlight tag
  document.querySelectorAll(".nav-tag").forEach(el => el.classList.toggle("active", el.dataset.tag === tag));
}

function renderNote(note) {
  var area = document.getElementById("content-area");
  var backlinks = (DATA.links[note.rel] || []).filter(r => r !== note.rel);
  var uniqueBacklinks = [...new Set(backlinks)];
  
  var tagsHtml = note.tags.map(t => `<span class="tag-pill" onclick="filterByTag('${t}')">${t}</span>`).join("");
  
  area.innerHTML = `
    <div class="content">
      <div id="fm-card">
        <div class="fm-row"><span class="fm-label">标题</span><span>${escHtml(note.title)}</span></div>
        <div class="fm-row"><span class="fm-label">分类</span><span>${note.category}</span></div>
        ${note.summary ? `<div class="fm-row"><span class="fm-label">摘要</span><span>${escHtml(note.summary)}</span></div>` : ""}
        ${tagsHtml ? `<div class="fm-row"><span class="fm-label">标签</span><span id="fm-tags">${tagsHtml}</span></div>` : ""}
      </div>
      ${note.html}
      ${uniqueBacklinks.length > 0 ? `
        <div id="backlinks-section">
          <h3>被引用自 (${uniqueBacklinks.length})</h3>
          <ul id="backlinks-list">
            ${uniqueBacklinks.map(r => { var n = DATA.notes.find(x => x.rel === r); return n ? `<li><a href="#" onclick="showNote('${n.rel}');return false">${escHtml(n.title)}</a></li>` : ""; }).join("")}
          </ul>
        </div>
      ` : ""}
    </div>
  `;
  area.scrollTop = 0;
}

function renderList(title, items) {
  var area = document.getElementById("content-area");
  if (items.length === 0) {
    area.innerHTML = `<div id="empty-state"><h2>无结果</h2><p>没有找到匹配的笔记</p></div>`;
    return;
  }
  area.innerHTML = `<div class="content"><h1>${escHtml(title)}</h1><p>共 ${items.length} 篇笔记</p><div class="welcome-grid">${items.map(n => `
    <div class="welcome-category">
      <h3><a href="#" onclick="showNote('${n.rel}');return false">${escHtml(n.title)}</a></h3>
      <span style="font-size:12px;color:var(--text-muted)">${n.category}</span>
      ${n.summary ? `<p style="font-size:13px;color:var(--text-muted);margin:2px 0">${escHtml(n.summary)}</p>` : ""}
    </div>`).join("")}</div></div>`;
}

function updateSidebar(activeRel) {
  // Build navigation tree
  var cats = {};
  for (var n of DATA.notes) {
    if (n.rel.startsWith("00-")) continue; // skip index pages in sidebar
    if (!cats[n.category]) cats[n.category] = [];
    cats[n.category].push(n);
  }
  
  var html = "";
  var sortedCats = Object.keys(cats).sort();
  for (var cat of sortedCats) {
    var displayCat = cat.replace("计算机视觉/", "");
    html += `<div class="nav-section"><div class="nav-section-title">${displayCat}</div>`;
    for (var n of cats[cat]) {
      var active = n.rel === activeRel ? ' active' : '';
      html += `<a class="nav-item${active}" href="#" onclick="showNote('${n.rel}');return false" title="${escHtml(n.title)}">${escHtml(n.title)}</a>
`;
    }
    html += `</div>`;
  }
  document.getElementById("sidebar-content").innerHTML = html;
  
  // Tags
  var tagHtml = "";
  var sortedTags = Object.keys(DATA.tags).sort();
  for (var t of sortedTags) {
    var active = t === currentTag ? ' active' : '';
    tagHtml += `<span class="nav-tag${active}" data-tag="${t}" onclick="filterByTag('${t}')">${t}</span>`;
  }
  document.getElementById("tags-container").innerHTML = tagHtml;
}

function updateBreadcrumb(path) {
  var bc = document.getElementById("breadcrumb");
  var html = `<span onclick="showWelcome()">首页</span>`;
  for (var p of path) {
    html += `<span id="breadcrumb-sep">/</span><span>${escHtml(p)}</span>`;
  }
  bc.innerHTML = html;
}

function filterNotes(query) {
  if (!query) {
    if (currentNote) { showNote(currentNote.rel); return; }
    if (currentTag) { filterByTag(currentTag); return; }
    showWelcome();
    return;
  }
  var q = query.toLowerCase();
  var results = DATA.notes.filter(n => {
    if (n.rel.startsWith("00-")) return false;
    return n.title.toLowerCase().includes(q) || n.summary.toLowerCase().includes(q) || n.body.toLowerCase().includes(q) || n.tags.some(t => t.toLowerCase().includes(q));
  });
  renderList("搜索: " + query, results);
  updateSidebar(null);
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebar-overlay").classList.toggle("show");
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.remove("show");
}
document.getElementById("sidebar-overlay").onclick = closeSidebar;

function escHtml(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ===== INIT =====
showWelcome();
</script>
</body>
</html>
